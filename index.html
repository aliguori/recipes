lle\", sans-serif;\n    font-weight: 500;\n    letter-spacing: 0.18em;\n    text-transform: uppercase;\n    font-size: 10pt;\n    color: #333;\n    margin-bottom: 5px;\n  }\n\n  .subhead {\n    font-weight: 700;\n    font-size: 7pt;\n    margin: 4px 0 1px;\n  }\n  .subhead:first-of-type { margin-top: 0; }\n\n  ul { list-style: none; }\n  ul li {\n    position: relative;\n    font-size: 6.7pt;\n    line-height: 1.28;\n    padding-left: 9px;\n    margin-bottom: 1.5px;\n  }\n  ul li::before {\n    content: \"\";\n    position: absolute;\n    left: 0; top: 4.5px;\n    width: 2.6px; height: 2.6px;\n    border-radius: 50%;\n    background: #2b2b2b;\n  }\n\n  ol { list-style: none; counter-reset: step; }\n  ol li {\n    position: relative;\n    counter-increment: step;\n    font-size: 6.7pt;\n    line-height: 1.26;\n    padding-left: 13px;\n    margin-bottom: 2.5px;\n  }\n  ol li::before {\n    content: counter(step) \".\";\n    position: absolute;\n    left: 0; top: 0;\n    font-weight: 600;\n    font-size: 6.7pt;\n  }\n  .lead { font-weight: 700; }\n\n  /* optional attribution footer, pinned to the bottom of the card */\n  .source {\n    margin-top: auto;\n    padding-top: 5px;\n    text-align: center;\n    font-style: italic;\n    font-size: 6pt;\n    letter-spacing: 0.03em;\n    color: #8a8275;\n  }\n<\/style>\n<\/head>\n<body>\n  <div class=\"card\">\n    <h1 class=\"title\">Grandma&#x27;s Rock Buns<\/h1>\n    <div class=\"rule\"><\/div>\n\n    <div class=\"stats\">\n      <div class=\"stat\">\n        <svg width=\"30\" height=\"30\" viewBox=\"0 0 64 64\" fill=\"none\" stroke=\"#2b2b2b\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\n          <circle cx=\"34\" cy=\"32\" r=\"15\"/>\n          <circle cx=\"34\" cy=\"32\" r=\"9\"/>\n          <line x1=\"5\" y1=\"15\" x2=\"5\" y2=\"25\"/>\n          <line x1=\"9\" y1=\"15\" x2=\"9\" y2=\"25\"/>\n          <line x1=\"13\" y1=\"15\" x2=\"13\" y2=\"25\"/>\n          <path d=\"M5 25 H13 M9 25 V49\"/>\n          <path d=\"M57 15 V31 M57 15 C53 19 53 28 57 31\"/>\n          <line x1=\"57\" y1=\"31\" x2=\"57\" y2=\"49\"/>\n        <\/svg>\n        <div class=\"label\"><b>9 Buns<\/b><\/div>\n      <\/div>\n      <div class=\"divider\"><\/div>\n      <div class=\"stat\">\n        <svg width=\"30\" height=\"30\" viewBox=\"0 0 64 64\" fill=\"none\" stroke=\"#2b2b2b\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\n          <circle cx=\"32\" cy=\"36\" r=\"19\"/>\n          <line x1=\"32\" y1=\"36\" x2=\"32\" y2=\"25\"/>\n          <line x1=\"32\" y1=\"36\" x2=\"40\" y2=\"36\"/>\n          <line x1=\"32\" y1=\"10\" x2=\"32\" y2=\"17\"/>\n          <line x1=\"26\" y1=\"10\" x2=\"38\" y2=\"10\"/>\n          <line x1=\"50\" y1=\"20\" x2=\"54\" y2=\"16\"/>\n        <\/svg>\n        <div class=\"label\">Prep Time:<br><b>15 Min<\/b><\/div>\n      <\/div>\n      <div class=\"divider\"><\/div>\n      <div class=\"stat\">\n        <svg width=\"30\" height=\"30\" viewBox=\"0 0 64 64\" fill=\"none\" stroke=\"#2b2b2b\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\n          <circle cx=\"32\" cy=\"36\" r=\"19\"/>\n          <line x1=\"32\" y1=\"36\" x2=\"32\" y2=\"25\"/>\n          <line x1=\"32\" y1=\"36\" x2=\"40\" y2=\"36\"/>\n          <line x1=\"32\" y1=\"10\" x2=\"32\" y2=\"17\"/>\n          <line x1=\"26\" y1=\"10\" x2=\"38\" y2=\"10\"/>\n          <line x1=\"50\" y1=\"20\" x2=\"54\" y2=\"16\"/>\n        <\/svg>\n        <div class=\"label\">Cook Time:<br><b>15 Min<\/b><\/div>\n      <\/div>\n    <\/div>\n\n    <div class=\"rule thin\"><\/div>\n\n    <div class=\"content\">\n      <div class=\"col-ingredients\">\n        <h2>Ingredients<\/h2>\n\n        <ul>\n                  <li>8 oz plain flour<\/li>\n                  <li>1 tsp baking powder<\/li>\n                  <li>1 tsp mixed spice<\/li>\n                  <li>4 oz margarine<\/li>\n                  <li>4 oz caster sugar<\/li>\n                  <li>6 oz mixed fruit<\/li>\n                  <li>2 oz desiccated coconut<\/li>\n                  <li>2 eggs, beaten<\/li>\n                <\/ul>\n      <\/div>\n\n      <div class=\"col-directions\">\n        <h2>Directions<\/h2>\n        <ol>\n          <li>Sift the flour, baking powder, and mixed spice into a bowl.<\/li>\n          <li>Chop the margarine and rub it into the flour mixture until it reaches a breadcrumb consistency.<\/li>\n          <li>Add the sugar, coconut, and mixed fruit and mix well.<\/li>\n          <li>Stir in the eggs.<\/li>\n          <li>If needed, add a very small amount of water until the dough reaches a soft dropping consistency — it drops off the spoon in about 5 seconds.<\/li>\n          <li>Scoop into about 9 buns on a baking sheet. Bake at gas mark 7 (220°C / 425°F) for 15 minutes.<\/li>\n        <\/ol>\n      <\/div>\n    <\/div>\n    <div class=\"source\">Handed down from Grandma in Nelson, England<\/div>\n  <\/div>\n<\/body>\n<\/html>\n"},

ans-serif;\n    font-weight: 500;\n    letter-spacing: 0.18em;\n    text-transform: uppercase;\n    font-size: 10pt;\n    color: #333;\n    margin-bottom: 5px;\n  }\n\n  .subhead {\n    font-weight: 700;\n    font-size: 7pt;\n    margin: 4px 0 1px;\n  }\n  .subhead:first-of-type { margin-top: 0; }\n\n  ul { list-style: none; }\n  ul li {\n    position: relative;\n    font-size: 6.7pt;\n    line-height: 1.28;\n    padding-left: 9px;\n    margin-bottom: 1.5px;\n  }\n  ul li::before {\n    content: \"\";\n    position: absolute;\n    left: 0; top: 4.5px;\n    width: 2.6px; height: 2.6px;\n    border-radius: 50%;\n    background: #2b2b2b;\n  }\n\n  ol { list-style: none; counter-reset: step; }\n  ol li {\n    position: relative;\n    counter-increment: step;\n    font-size: 6.7pt;\n    line-height: 1.26;\n    padding-left: 13px;\n    margin-bottom: 2.5px;\n  }\n  ol li::before {\n    content: counter(step) \".\";\n    position: absolute;\n    left: 0; top: 0;\n    font-weight: 600;\n    font-size: 6.7pt;\n  }\n  .lead { font-weight: 700; }\n\n  /* optional attribution footer, pinned to the bottom of the card */\n  .source {\n    margin-top: auto;\n    padding-top: 5px;\n    text-align: center;\n    font-style: italic;\n    font-size: 6pt;\n    letter-spacing: 0.03em;\n    color: #8a8275;\n  }\n<\/style>\n<\/head>\n<body>\n  <div class=\"card\">\n    <h1 class=\"title\">Lemon Jelly<\/h1>\n    <div class=\"rule\"><\/div>\n\n    <div class=\"stats\">\n      <div class=\"stat\">\n        <svg width=\"30\" height=\"30\" viewBox=\"0 0 64 64\" fill=\"none\" stroke=\"#2b2b2b\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\n          <circle cx=\"34\" cy=\"32\" r=\"15\"/>\n          <circle cx=\"34\" cy=\"32\" r=\"9\"/>\n          <line x1=\"5\" y1=\"15\" x2=\"5\" y2=\"25\"/>\n          <line x1=\"9\" y1=\"15\" x2=\"9\" y2=\"25\"/>\n          <line x1=\"13\" y1=\"15\" x2=\"13\" y2=\"25\"/>\n          <path d=\"M5 25 H13 M9 25 V49\"/>\n          <path d=\"M57 15 V31 M57 15 C53 19 53 28 57 31\"/>\n          <line x1=\"57\" y1=\"31\" x2=\"57\" y2=\"49\"/>\n        <\/svg>\n        <div class=\"label\"><b>4–5 Half-Pints<\/b><\/div>\n      <\/div>\n      <div class=\"divider\"><\/div>\n      <div class=\"stat\">\n        <svg width=\"30\" height=\"30\" viewBox=\"0 0 64 64\" fill=\"none\" stroke=\"#2b2b2b\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\n          <circle cx=\"32\" cy=\"36\" r=\"19\"/>\n          <line x1=\"32\" y1=\"36\" x2=\"32\" y2=\"25\"/>\n          <line x1=\"32\" y1=\"36\" x2=\"40\" y2=\"36\"/>\n          <line x1=\"32\" y1=\"10\" x2=\"32\" y2=\"17\"/>\n          <line x1=\"26\" y1=\"10\" x2=\"38\" y2=\"10\"/>\n          <line x1=\"50\" y1=\"20\" x2=\"54\" y2=\"16\"/>\n        <\/svg>\n        <div class=\"label\">Prep Time:<br><b>45 Min<\/b><\/div>\n      <\/div>\n      <div class=\"divider\"><\/div>\n      <div class=\"stat\">\n        <svg width=\"30\" height=\"30\" viewBox=\"0 0 64 64\" fill=\"none\" stroke=\"#2b2b2b\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\n          <circle cx=\"32\" cy=\"36\" r=\"19\"/>\n          <line x1=\"32\" y1=\"36\" x2=\"32\" y2=\"25\"/>\n          <line x1=\"32\" y1=\"36\" x2=\"40\" y2=\"36\"/>\n          <line x1=\"32\" y1=\"10\" x2=\"32\" y2=\"17\"/>\n          <line x1=\"26\" y1=\"10\" x2=\"38\" y2=\"10\"/>\n          <line x1=\"50\" y1=\"20\" x2=\"54\" y2=\"16\"/>\n        <\/svg>\n        <div class=\"label\">Cook Time:<br><b>20 Min<\/b><\/div>\n      <\/div>\n    <\/div>\n\n    <div class=\"rule thin\"><\/div>\n\n    <div class=\"content\">\n      <div class=\"col-ingredients\">\n        <h2>Ingredients<\/h2>\n\n        <div class=\"subhead\">Clarified Juice:<\/div>\n        <ul>\n                  <li>8 cups freshly squeezed lemon juice, strained<\/li>\n                  <li>agar-agar powder (see step 1)<\/li>\n                <\/ul>\n        <div class=\"subhead\">Jelly:<\/div>\n        <ul>\n                  <li>4 cups clarified lemon juice<\/li>\n                  <li>¾ cup sugar<\/li>\n                  <li>4 tsp Pomona&#x27;s pectin powder<\/li>\n                  <li>4 tsp Pomona&#x27;s calcium water<\/li>\n                <\/ul>\n      <\/div>\n\n      <div class=\"col-directions\">\n        <h2>Directions<\/h2>\n        <ol>\n          <li><span class=\"lead\">Clarify:<\/span> Weigh the lemon juice. Measure water equal to ¼ of that weight, and agar equal to 0.2% of the juice weight.<\/li>\n          <li>Whisk the agar into the water, boil while stirring, and simmer a couple minutes to hydrate.<\/li>\n          <li>While briskly whisking the boiling agar, slowly add the lemon juice in a thin stream.<\/li>\n          <li>Set the mixture over an ice bath to gel, then gently whisk it into agar curds.<\/li>\n          <li>Pour into a cheesecloth-lined strainer; lift and gently squeeze to drain the clear juice, stirring the curds to release more. Re-strain if needed.<\/li>\n          <li><span class=\"lead\">Make the jelly:<\/span> Combine 4 cups clarified juice with the calcium water in a pot.<\/li>\n          <li>Mix the sugar and pectin powder thoroughly in a separate bowl.<\/li>\n          <li>Boil the juice, add the pectin-sugar, and stir vigorously 1–2 minutes to dissolve. Return to a boil and remove from heat.<\/li>\n          <li>Ladle into hot jars, leaving ¼″ headspace. Process in a boiling water bath 10 minutes.<\/li>\n        <\/ol>\n      <\/div>\n    <\/div>\n    \n  <\/div>\n<\/body>\n<\/html>\n"},

ns-serif;\n    font-weight: 500;\n    letter-spacing: 0.18em;\n    text-transform: uppercase;\n    font-size: 10pt;\n    color: #333;\n    margin-bottom: 5px;\n  }\n\n  .subhead {\n    font-weight: 700;\n    font-size: 7pt;\n    margin: 4px 0 1px;\n  }\n  .subhead:first-of-type { margin-top: 0; }\n\n  ul { list-style: none; }\n  ul li {\n    position: relative;\n    font-size: 6.7pt;\n    line-height: 1.28;\n    padding-left: 9px;\n    margin-bottom: 1.5px;\n  }\n  ul li::before {\n    content: \"\";\n    position: absolute;\n    left: 0; top: 4.5px;\n    width: 2.6px; height: 2.6px;\n    border-radius: 50%;\n    background: #2b2b2b;\n  }\n\n  ol { list-style: none; counter-reset: step; }\n  ol li {\n    position: relative;\n    counter-increment: step;\n    font-size: 6.7pt;\n    line-height: 1.26;\n    padding-left: 13px;\n    margin-bottom: 2.5px;\n  }\n  ol li::before {\n    content: counter(step) \".\";\n    position: absolute;\n    left: 0; top: 0;\n    font-weight: 600;\n    font-size: 6.7pt;\n  }\n  .lead { font-weight: 700; }\n\n  /* optional attribution footer, pinned to the bottom of the card */\n  .source {\n    margin-top: auto;\n    padding-top: 5px;\n    text-align: center;\n    font-style: italic;\n    font-size: 6pt;\n    letter-spacing: 0.03em;\n    color: #8a8275;\n  }\n<\/style>\n<\/head>\n<body>\n  <div class=\"card\">\n    <h1 class=\"title\">Mince Pies<\/h1>\n    <div class=\"rule\"><\/div>\n\n    <div class=\"stats\">\n      <div class=\"stat\">\n        <svg width=\"30\" height=\"30\" viewBox=\"0 0 64 64\" fill=\"none\" stroke=\"#2b2b2b\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\n          <circle cx=\"34\" cy=\"32\" r=\"15\"/>\n          <circle cx=\"34\" cy=\"32\" r=\"9\"/>\n          <line x1=\"5\" y1=\"15\" x2=\"5\" y2=\"25\"/>\n          <line x1=\"9\" y1=\"15\" x2=\"9\" y2=\"25\"/>\n          <line x1=\"13\" y1=\"15\" x2=\"13\" y2=\"25\"/>\n          <path d=\"M5 25 H13 M9 25 V49\"/>\n          <path d=\"M57 15 V31 M57 15 C53 19 53 28 57 31\"/>\n          <line x1=\"57\" y1=\"31\" x2=\"57\" y2=\"49\"/>\n        <\/svg>\n        <div class=\"label\"><b>12 Mince Pies<\/b><\/div>\n      <\/div>\n      <div class=\"divider\"><\/div>\n      <div class=\"stat\">\n        <svg width=\"30\" height=\"30\" viewBox=\"0 0 64 64\" fill=\"none\" stroke=\"#2b2b2b\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\n          <circle cx=\"32\" cy=\"36\" r=\"19\"/>\n          <line x1=\"32\" y1=\"36\" x2=\"32\" y2=\"25\"/>\n          <line x1=\"32\" y1=\"36\" x2=\"40\" y2=\"36\"/>\n          <line x1=\"32\" y1=\"10\" x2=\"32\" y2=\"17\"/>\n          <line x1=\"26\" y1=\"10\" x2=\"38\" y2=\"10\"/>\n          <line x1=\"50\" y1=\"20\" x2=\"54\" y2=\"16\"/>\n        <\/svg>\n        <div class=\"label\">Prep Time:<br><b>10 Min<\/b><\/div>\n      <\/div>\n      <div class=\"divider\"><\/div>\n      <div class=\"stat\">\n        <svg width=\"30\" height=\"30\" viewBox=\"0 0 64 64\" fill=\"none\" stroke=\"#2b2b2b\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\n          <circle cx=\"32\" cy=\"36\" r=\"19\"/>\n          <line x1=\"32\" y1=\"36\" x2=\"32\" y2=\"25\"/>\n          <line x1=\"32\" y1=\"36\" x2=\"40\" y2=\"36\"/>\n          <line x1=\"32\" y1=\"10\" x2=\"32\" y2=\"17\"/>\n          <line x1=\"26\" y1=\"10\" x2=\"38\" y2=\"10\"/>\n          <line x1=\"50\" y1=\"20\" x2=\"54\" y2=\"16\"/>\n        <\/svg>\n        <div class=\"label\">Cook Time:<br><b>18 Min<\/b><\/div>\n      <\/div>\n    <\/div>\n\n    <div class=\"rule thin\"><\/div>\n\n    <div class=\"content\">\n      <div class=\"col-ingredients\">\n        <h2>Ingredients<\/h2>\n\n        <ul>\n                  <li>1 package store-bought pie crusts<\/li>\n                  <li>1 cup mincemeat<\/li>\n                  <li>1 egg<\/li>\n                <\/ul>\n      <\/div>\n\n      <div class=\"col-directions\">\n        <h2>Directions<\/h2>\n        <ol>\n          <li>Preheat the oven to 400°F.<\/li>\n          <li>Unroll one pie crust. With a round cutter slightly larger than the pan&#x27;s cups, cut 12 circles for the bottom crusts and gently press one into each cup.<\/li>\n          <li>Spoon mincemeat into each crust, no higher than level with the top of the crust.<\/li>\n          <li>Unroll the other crust. With a slightly smaller cutter (or decorative shapes), cut 12 top crusts and place them over the mincemeat.<\/li>\n          <li>Brush the tops with egg wash (1 egg beaten with 1 tbsp water).<\/li>\n          <li>Bake at 400°F for 13 to 18 minutes, until the tops are golden brown.<\/li>\n          <li>Cool slightly in the pan, then move to a wire rack to cool completely.<\/li>\n          <li>Optional: dust with powdered sugar.<\/li>\n        <\/ol>\n      <\/div>\n    <\/div>\n    \n  <\/div>\n<\/body>\n<\/html>\n"},

ville\", sans-serif;\n    font-weight: 500;\n    letter-spacing: 0.18em;\n    text-transform: uppercase;\n    font-size: 10pt;\n    color: #333;\n    margin-bottom: 5px;\n  }\n\n  .subhead {\n    font-weight: 700;\n    font-size: 7pt;\n    margin: 4px 0 1px;\n  }\n  .subhead:first-of-type { margin-top: 0; }\n\n  ul { list-style: none; }\n  ul li {\n    position: relative;\n    font-size: 6.7pt;\n    line-height: 1.28;\n    padding-left: 9px;\n    margin-bottom: 1.5px;\n  }\n  ul li::before {\n    content: \"\";\n    position: absolute;\n    left: 0; top: 4.5px;\n    width: 2.6px; height: 2.6px;\n    border-radius: 50%;\n    background: #2b2b2b;\n  }\n\n  ol { list-style: none; counter-reset: step; }\n  ol li {\n    position: relative;\n    counter-increment: step;\n    font-size: 6.7pt;\n    line-height: 1.26;\n    padding-left: 13px;\n    margin-bottom: 2.5px;\n  }\n  ol li::before {\n    content: counter(step) \".\";\n    position: absolute;\n    left: 0; top: 0;\n    font-weight: 600;\n    font-size: 6.7pt;\n  }\n  .lead { font-weight: 700; }\n\n  /* optional attribution footer, pinned to the bottom of the card */\n  .source {\n    margin-top: auto;\n    padding-top: 5px;\n    text-align: center;\n    font-style: italic;\n    font-size: 6pt;\n    letter-spacing: 0.03em;\n    color: #8a8275;\n  }\n<\/style>\n<\/head>\n<body>\n  <div class=\"card\">\n    <h1 class=\"title\">Spicy Pineapple Jelly<\/h1>\n    <div class=\"rule\"><\/div>\n\n    <div class=\"stats\">\n      <div class=\"stat\">\n        <svg width=\"30\" height=\"30\" viewBox=\"0 0 64 64\" fill=\"none\" stroke=\"#2b2b2b\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\n          <circle cx=\"34\" cy=\"32\" r=\"15\"/>\n          <circle cx=\"34\" cy=\"32\" r=\"9\"/>\n          <line x1=\"5\" y1=\"15\" x2=\"5\" y2=\"25\"/>\n          <line x1=\"9\" y1=\"15\" x2=\"9\" y2=\"25\"/>\n          <line x1=\"13\" y1=\"15\" x2=\"13\" y2=\"25\"/>\n          <path d=\"M5 25 H13 M9 25 V49\"/>\n          <path d=\"M57 15 V31 M57 15 C53 19 53 28 57 31\"/>\n          <line x1=\"57\" y1=\"31\" x2=\"57\" y2=\"49\"/>\n        <\/svg>\n        <div class=\"label\"><b>8 Half-Pints<\/b><\/div>\n      <\/div>\n      <div class=\"divider\"><\/div>\n      <div class=\"stat\">\n        <svg width=\"30\" height=\"30\" viewBox=\"0 0 64 64\" fill=\"none\" stroke=\"#2b2b2b\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\n          <circle cx=\"32\" cy=\"36\" r=\"19\"/>\n          <line x1=\"32\" y1=\"36\" x2=\"32\" y2=\"25\"/>\n          <line x1=\"32\" y1=\"36\" x2=\"40\" y2=\"36\"/>\n          <line x1=\"32\" y1=\"10\" x2=\"32\" y2=\"17\"/>\n          <line x1=\"26\" y1=\"10\" x2=\"38\" y2=\"10\"/>\n          <line x1=\"50\" y1=\"20\" x2=\"54\" y2=\"16\"/>\n        <\/svg>\n        <div class=\"label\">Prep Time:<br><b>20 Min<\/b><\/div>\n      <\/div>\n      <div class=\"divider\"><\/div>\n      <div class=\"stat\">\n        <svg width=\"30\" height=\"30\" viewBox=\"0 0 64 64\" fill=\"none\" stroke=\"#2b2b2b\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\n          <circle cx=\"32\" cy=\"36\" r=\"19\"/>\n          <line x1=\"32\" y1=\"36\" x2=\"32\" y2=\"25\"/>\n          <line x1=\"32\" y1=\"36\" x2=\"40\" y2=\"36\"/>\n          <line x1=\"32\" y1=\"10\" x2=\"32\" y2=\"17\"/>\n          <line x1=\"26\" y1=\"10\" x2=\"38\" y2=\"10\"/>\n          <line x1=\"50\" y1=\"20\" x2=\"54\" y2=\"16\"/>\n        <\/svg>\n        <div class=\"label\">Cook Time:<br><b>15 Min<\/b><\/div>\n      <\/div>\n    <\/div>\n\n    <div class=\"rule thin\"><\/div>\n\n    <div class=\"content\">\n      <div class=\"col-ingredients\">\n        <h2>Ingredients<\/h2>\n\n        <div class=\"subhead\">Spicy Pineapple Juice:<\/div>\n        <ul>\n                  <li>46 oz can pure pineapple juice<\/li>\n                  <li>2 jalapeño peppers, sliced<\/li>\n                <\/ul>\n        <div class=\"subhead\">Jelly:<\/div>\n        <ul>\n                  <li>3½ cups spicy pineapple juice<\/li>\n                  <li>½ cup white vinegar<\/li>\n                  <li>7 cups sugar<\/li>\n                  <li>2 (3 oz) pouches liquid pectin<\/li>\n                <\/ul>\n      <\/div>\n\n      <div class=\"col-directions\">\n        <h2>Directions<\/h2>\n        <ol>\n          <li><span class=\"lead\">Make the juice:<\/span> Strain the pineapple juice through 4 layers of cheesecloth.<\/li>\n          <li>Add the sliced jalapeños (with seeds), let sit 2 minutes, then strain through a sieve. Longer steeping gives a spicier jelly.<\/li>\n          <li>Filter through 1 coffee filter, then measure out 3½ cups.<\/li>\n          <li><span class=\"lead\">Make the jelly:<\/span> Combine the juice and vinegar in a pot and heat over medium until warm.<\/li>\n          <li>Add the sugar and heat, stirring constantly, until fully dissolved.<\/li>\n          <li>Raise heat to medium-high and bring to a full rolling boil, stirring constantly.<\/li>\n          <li>Stir in the pectin, return to a full rolling boil, and boil 1 minute. Remove from heat.<\/li>\n          <li>Skim off foam and ladle into hot jars, leaving ¼″ headspace. Process in a boiling water bath 10 minutes.<\/li>\n        <\/ol>\n      <\/div>\n    <\/div>\n    <div class=\"source\">Adapted from Taste of Home&#x27;s Cranberry Jalapeño Jelly<\/div>\n  <\/div>\n<\/body>\n<\/html>\n"},

\", sans-serif;\n    font-weight: 500;\n    letter-spacing: 0.18em;\n    text-transform: uppercase;\n    font-size: 10pt;\n    color: #333;\n    margin-bottom: 5px;\n  }\n\n  .subhead {\n    font-weight: 700;\n    font-size: 7pt;\n    margin: 4px 0 1px;\n  }\n  .subhead:first-of-type { margin-top: 0; }\n\n  ul { list-style: none; }\n  ul li {\n    position: relative;\n    font-size: 6.7pt;\n    line-height: 1.28;\n    padding-left: 9px;\n    margin-bottom: 1.5px;\n  }\n  ul li::before {\n    content: \"\";\n    position: absolute;\n    left: 0; top: 4.5px;\n    width: 2.6px; height: 2.6px;\n    border-radius: 50%;\n    background: #2b2b2b;\n  }\n\n  ol { list-style: none; counter-reset: step; }\n  ol li {\n    position: relative;\n    counter-increment: step;\n    font-size: 6.7pt;\n    line-height: 1.26;\n    padding-left: 13px;\n    margin-bottom: 2.5px;\n  }\n  ol li::before {\n    content: counter(step) \".\";\n    position: absolute;\n    left: 0; top: 0;\n    font-weight: 600;\n    font-size: 6.7pt;\n  }\n  .lead { font-weight: 700; }\n\n  /* optional attribution footer, pinned to the bottom of the card */\n  .source {\n    margin-top: auto;\n    padding-top: 5px;\n    text-align: center;\n    font-style: italic;\n    font-size: 6pt;\n    letter-spacing: 0.03em;\n    color: #8a8275;\n  }\n<\/style>\n<\/head>\n<body>\n  <div class=\"card\">\n    <h1 class=\"title\">Fruit Rock Cakes<\/h1>\n    <div class=\"rule\"><\/div>\n\n    <div class=\"stats\">\n      <div class=\"stat\">\n        <svg width=\"30\" height=\"30\" viewBox=\"0 0 64 64\" fill=\"none\" stroke=\"#2b2b2b\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\n          <circle cx=\"34\" cy=\"32\" r=\"15\"/>\n          <circle cx=\"34\" cy=\"32\" r=\"9\"/>\n          <line x1=\"5\" y1=\"15\" x2=\"5\" y2=\"25\"/>\n          <line x1=\"9\" y1=\"15\" x2=\"9\" y2=\"25\"/>\n          <line x1=\"13\" y1=\"15\" x2=\"13\" y2=\"25\"/>\n          <path d=\"M5 25 H13 M9 25 V49\"/>\n          <path d=\"M57 15 V31 M57 15 C53 19 53 28 57 31\"/>\n          <line x1=\"57\" y1=\"31\" x2=\"57\" y2=\"49\"/>\n        <\/svg>\n        <div class=\"label\"><b>12 Rock Cakes<\/b><\/div>\n      <\/div>\n      <div class=\"divider\"><\/div>\n      <div class=\"stat\">\n        <svg width=\"30\" height=\"30\" viewBox=\"0 0 64 64\" fill=\"none\" stroke=\"#2b2b2b\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\n          <circle cx=\"32\" cy=\"36\" r=\"19\"/>\n          <line x1=\"32\" y1=\"36\" x2=\"32\" y2=\"25\"/>\n          <line x1=\"32\" y1=\"36\" x2=\"40\" y2=\"36\"/>\n          <line x1=\"32\" y1=\"10\" x2=\"32\" y2=\"17\"/>\n          <line x1=\"26\" y1=\"10\" x2=\"38\" y2=\"10\"/>\n          <line x1=\"50\" y1=\"20\" x2=\"54\" y2=\"16\"/>\n        <\/svg>\n        <div class=\"label\">Prep Time:<br><b>1½ Hrs<\/b><\/div>\n      <\/div>\n      <div class=\"divider\"><\/div>\n      <div class=\"stat\">\n        <svg width=\"30\" height=\"30\" viewBox=\"0 0 64 64\" fill=\"none\" stroke=\"#2b2b2b\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\n          <circle cx=\"32\" cy=\"36\" r=\"19\"/>\n          <line x1=\"32\" y1=\"36\" x2=\"32\" y2=\"25\"/>\n          <line x1=\"32\" y1=\"36\" x2=\"40\" y2=\"36\"/>\n          <line x1=\"32\" y1=\"10\" x2=\"32\" y2=\"17\"/>\n          <line x1=\"26\" y1=\"10\" x2=\"38\" y2=\"10\"/>\n          <line x1=\"50\" y1=\"20\" x2=\"54\" y2=\"16\"/>\n        <\/svg>\n        <div class=\"label\">Cook Time:<br><b>20 Min<\/b><\/div>\n      <\/div>\n    <\/div>\n\n    <div class=\"rule thin\"><\/div>\n\n    <div class=\"content\">\n      <div class=\"col-ingredients\">\n        <h2>Ingredients<\/h2>\n\n        <ul>\n                  <li>1 cup each diced rhubarb and strawberries<\/li>\n                  <li>2 tbsp white sugar<\/li>\n                  <li>2 cups whole wheat pastry flour<\/li>\n                  <li>⅓ cup brown sugar<\/li>\n                  <li>1½ tsp baking powder<\/li>\n                  <li>½ tsp baking soda<\/li>\n                  <li>3 tsp ground cinnamon<\/li>\n                  <li>½ tsp ground nutmeg<\/li>\n                  <li>½ tsp ground allspice<\/li>\n                  <li>¼ tsp ground cloves<\/li>\n                  <li>¼ tsp ground ginger<\/li>\n                  <li>6 tbsp butter, cold and sliced<\/li>\n                  <li>1 egg<\/li>\n                  <li>1 tsp vanilla extract<\/li>\n                  <li>1 cup milk<\/li>\n                <\/ul>\n      <\/div>\n\n      <div class=\"col-directions\">\n        <h2>Directions<\/h2>\n        <ol>\n          <li>Toss the rhubarb, strawberries, and white sugar in a bowl. Cover and macerate in the fridge 1–2 hours.<\/li>\n          <li>Preheat oven to 400°F and line a baking sheet with parchment.<\/li>\n          <li>Whisk together the flour, brown sugar, baking powder, baking soda, and spices.<\/li>\n          <li>In a small bowl, whisk the egg, vanilla, and ¼ cup of the milk.<\/li>\n          <li>Drain the fruit; add 2 tbsp of its syrup to the egg mixture and pat the fruit dry.<\/li>\n          <li>Rub the butter into the flour mixture to a breadcrumb consistency, then mix in the fruit until coated.<\/li>\n          <li>Stir in the egg mixture, then add the remaining milk a little at a time until it just comes together — drier and shaggier than plain rock cakes.<\/li>\n          <li>Scoop into 12 craggy balls on the baking sheet.<\/li>\n          <li>Bake at 400°F for 15 to 20 minutes, until golden at the top and edges. Cool on a wire rack.<\/li>\n        <\/ol>\n      <\/div>\n    <\/div>\n    <div class=\"source\">Adapted from Food Wishes&#x27; Strawberry Rhubarb Drop Biscuits<\/div>\n  <\/div>\n<\/body>\n<\/html>\n"},

"M57 15 V31 M57 15 C53 19 53 28 57 31\"/>\n          <line x1=\"57\" y1=\"31\" x2=\"57\" y2=\"49\"/>\n        <\/svg>\n        <div class=\"label\"><b>12 Rock Cakes<\/b><\/div>\n      <\/div>\n      <div class=\"divider\"><\/div>\n      <div class=\"stat\">\n        <svg width=\"30\" height=\"30\" viewBox=\"0 0 64 64\" fill=\"none\" stroke=\"#2b2b2b\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\n          <circle cx=\"32\" cy=\"36\" r=\"19\"/>\n          <line x1=\"32\" y1=\"36\" x2=\"32\" y2=\"25\"/>\n          <line x1=\"32\" y1=\"36\" x2=\"40\" y2=\"36\"/>\n          <line x1=\"32\" y1=\"10\" x2=\"32\" y2=\"17\"/>\n          <line x1=\"26\" y1=\"10\" x2=\"38\" y2=\"10\"/>\n          <line x1=\"50\" y1=\"20\" x2=\"54\" y2=\"16\"/>\n        <\/svg>\n        <div class=\"label\">Prep Time:<br><b>15 Min<\/b><\/div>\n      <\/div>\n      <div class=\"divider\"><\/div>\n      <div class=\"stat\">\n        <svg width=\"30\" height=\"30\" viewBox=\"0 0 64 64\" fill=\"none\" stroke=\"#2b2b2b\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\n          <circle cx=\"32\" cy=\"36\" r=\"19\"/>\n          <line x1=\"32\" y1=\"36\" x2=\"32\" y2=\"25\"/>\n          <line x1=\"32\" y1=\"36\" x2=\"40\" y2=\"36\"/>\n          <line x1=\"32\" y1=\"10\" x2=\"32\" y2=\"17\"/>\n          <line x1=\"26\" y1=\"10\" x2=\"38\" y2=\"10\"/>\n          <line x1=\"50\" y1=\"20\" x2=\"54\" y2=\"16\"/>\n        <\/svg>\n        <div class=\"label\">Cook Time:<br><b>17 Min<\/b><\/div>\n      <\/div>\n    <\/div>\n\n    <div class=\"rule thin\"><\/div>\n\n    <div class=\"content\">\n      <div class=\"col-ingredients\">\n        <h2>Ingredients<\/h2>\n\n        <ul>\n                  <li>2 cups whole wheat pastry flour<\/li>\n                  <li>⅓ cup brown sugar<\/li>\n                  <li>1½ tsp baking powder<\/li>\n                  <li>½ tsp baking soda<\/li>\n                  <li>3 tsp ground cinnamon<\/li>\n                  <li>½ tsp ground nutmeg<\/li>\n                  <li>½ tsp ground allspice<\/li>\n                  <li>¼ tsp ground cloves<\/li>\n                  <li>¼ tsp ground ginger<\/li>\n                  <li>6 tbsp butter, cold and sliced<\/li>\n                  <li>1 egg<\/li>\n                  <li>1 tsp vanilla extract<\/li>\n                  <li>1 cup milk<\/li>\n                  <li>½ cup golden raisins<\/li>\n                  <li>⅓ cup dried currants<\/li>\n                <\/ul>\n      <\/div>\n\n      <div class=\"col-directions\">\n        <h2>Directions<\/h2>\n        <ol>\n          <li>Preheat the oven to 400°F. Line a baking sheet with parchment paper.<\/li>\n          <li>In a large bowl, whisk together the flour, sugar, baking powder, baking soda, and spices.<\/li>\n          <li>In a small bowl, whisk together the egg, vanilla, and ¼ cup of the milk.<\/li>\n          <li>Rub the butter into the flour mixture by hand until it reaches a breadcrumb consistency.<\/li>\n          <li>Add the egg mixture and stir with a spatula to combine.<\/li>\n          <li>Stir in the remaining milk a little at a time (up to ¼ cup at a time) until the dough reaches a soft dropping consistency — it drops off the spoon in about 5 seconds.<\/li>\n          <li>Fold in the raisins and currants in two or three batches.<\/li>\n          <li>Scoop into 12 rough balls on the baking sheet with an ice cream scoop; leave them craggy.<\/li>\n          <li>Bake at 400°F for 13 to 17 minutes, until golden on top and at the edges; the bottom should sound hollow when tapped. Cool on a wire rack.<\/li>\n        <\/ol>\n      <\/div>\n    <\/div>\n    <div class=\"source\">Adapted from Erin Jeanne McDowell&#x27;s Drop Biscuits<\/div>\n  <\/div>\n<\/body>\n<\/html>\n"},

rville\", sans-serif;\n    font-weight: 500;\n    letter-spacing: 0.18em;\n    text-transform: uppercase;\n    font-size: 10pt;\n    color: #333;\n    margin-bottom: 5px;\n  }\n\n  .subhead {\n    font-weight: 700;\n    font-size: 7pt;\n    margin: 4px 0 1px;\n  }\n  .subhead:first-of-type { margin-top: 0; }\n\n  ul { list-style: none; }\n  ul li {\n    position: relative;\n    font-size: 6.7pt;\n    line-height: 1.28;\n    padding-left: 9px;\n    margin-bottom: 1.5px;\n  }\n  ul li::before {\n    content: \"\";\n    position: absolute;\n    left: 0; top: 4.5px;\n    width: 2.6px; height: 2.6px;\n    border-radius: 50%;\n    background: #2b2b2b;\n  }\n\n  ol { list-style: none; counter-reset: step; }\n  ol li {\n    position: relative;\n    counter-increment: step;\n    font-size: 6.7pt;\n    line-height: 1.26;\n    padding-left: 13px;\n    margin-bottom: 2.5px;\n  }\n  ol li::before {\n    content: counter(step) \".\";\n    position: absolute;\n    left: 0; top: 0;\n    font-weight: 600;\n    font-size: 6.7pt;\n  }\n  .lead { font-weight: 700; }\n\n  /* optional attribution footer, pinned to the bottom of the card */\n  .source {\n    margin-top: auto;\n    padding-top: 5px;\n    text-align: center;\n    font-style: italic;\n    font-size: 6pt;\n    letter-spacing: 0.03em;\n    color: #8a8275;\n  }\n<\/style>\n<\/head>\n<body>\n  <div class=\"card\">\n    <h1 class=\"title\">Strawberry Rhubarb Jam<\/h1>\n    <div class=\"rule\"><\/div>\n\n    <div class=\"stats\">\n      <div class=\"stat\">\n        <svg width=\"30\" height=\"30\" viewBox=\"0 0 64 64\" fill=\"none\" stroke=\"#2b2b2b\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\n          <circle cx=\"34\" cy=\"32\" r=\"15\"/>\n          <circle cx=\"34\" cy=\"32\" r=\"9\"/>\n          <line x1=\"5\" y1=\"15\" x2=\"5\" y2=\"25\"/>\n          <line x1=\"9\" y1=\"15\" x2=\"9\" y2=\"25\"/>\n          <line x1=\"13\" y1=\"15\" x2=\"13\" y2=\"25\"/>\n          <path d=\"M5 25 H13 M9 25 V49\"/>\n          <path d=\"M57 15 V31 M57 15 C53 19 53 28 57 31\"/>\n          <line x1=\"57\" y1=\"31\" x2=\"57\" y2=\"49\"/>\n        <\/svg>\n        <div class=\"label\"><b>2–3 Half-Pints<\/b><\/div>\n      <\/div>\n      <div class=\"divider\"><\/div>\n      <div class=\"stat\">\n        <svg width=\"30\" height=\"30\" viewBox=\"0 0 64 64\" fill=\"none\" stroke=\"#2b2b2b\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\n          <circle cx=\"32\" cy=\"36\" r=\"19\"/>\n          <line x1=\"32\" y1=\"36\" x2=\"32\" y2=\"25\"/>\n          <line x1=\"32\" y1=\"36\" x2=\"40\" y2=\"36\"/>\n          <line x1=\"32\" y1=\"10\" x2=\"32\" y2=\"17\"/>\n          <line x1=\"26\" y1=\"10\" x2=\"38\" y2=\"10\"/>\n          <line x1=\"50\" y1=\"20\" x2=\"54\" y2=\"16\"/>\n        <\/svg>\n        <div class=\"label\">Prep Time:<br><b>8 Hrs<\/b><\/div>\n      <\/div>\n      <div class=\"divider\"><\/div>\n      <div class=\"stat\">\n        <svg width=\"30\" height=\"30\" viewBox=\"0 0 64 64\" fill=\"none\" stroke=\"#2b2b2b\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\n          <circle cx=\"32\" cy=\"36\" r=\"19\"/>\n          <line x1=\"32\" y1=\"36\" x2=\"32\" y2=\"25\"/>\n          <line x1=\"32\" y1=\"36\" x2=\"40\" y2=\"36\"/>\n          <line x1=\"32\" y1=\"10\" x2=\"32\" y2=\"17\"/>\n          <line x1=\"26\" y1=\"10\" x2=\"38\" y2=\"10\"/>\n          <line x1=\"50\" y1=\"20\" x2=\"54\" y2=\"16\"/>\n        <\/svg>\n        <div class=\"label\">Cook Time:<br><b>10 Min<\/b><\/div>\n      <\/div>\n    <\/div>\n\n    <div class=\"rule thin\"><\/div>\n\n    <div class=\"content\">\n      <div class=\"col-ingredients\">\n        <h2>Ingredients<\/h2>\n\n        <ul>\n                  <li>4 cups quartered strawberries<\/li>\n                  <li>1 cup finely chopped rhubarb<\/li>\n                  <li>2 cups sugar<\/li>\n                  <li>¼ cup lemon juice<\/li>\n                  <li>1 vanilla bean pod, scraped<\/li>\n                <\/ul>\n      <\/div>\n\n      <div class=\"col-directions\">\n        <h2>Directions<\/h2>\n        <ol>\n          <li>Mix the strawberries, rhubarb, and sugar in a large bowl. Let stand 8 hours, stirring occasionally.<\/li>\n          <li>Transfer to a pot and bring to a boil over medium heat.<\/li>\n          <li>Add the lemon juice and vanilla bean, return to a boil, and boil rapidly 5 minutes.<\/li>\n          <li>Remove from heat, cover, and let stand 24 hours.<\/li>\n          <li>Bring to a full boil over high heat and boil rapidly 5 minutes, stirring constantly. Remove from heat.<\/li>\n          <li>Skim off any foam and ladle into hot jars, leaving ¼″ headspace. Process in a boiling water bath 10 minutes.<\/li>\n        <\/ol>\n      <\/div>\n    <\/div>\n    <div class=\"source\">Adapted from The Complete Book of Small-Batch Preserving<\/div>\n  <\/div>\n<\/body>\n<\/html>\n"},

5 V31 M57 15 C53 19 53 28 57 31\"/>\n          <line x1=\"57\" y1=\"31\" x2=\"57\" y2=\"49\"/>\n        <\/svg>\n        <div class=\"label\"><b>16 Mugs<\/b><\/div>\n      <\/div>\n      <div class=\"divider\"><\/div>\n      <div class=\"stat\">\n        <svg width=\"30\" height=\"30\" viewBox=\"0 0 64 64\" fill=\"none\" stroke=\"#2b2b2b\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\n          <circle cx=\"32\" cy=\"36\" r=\"19\"/>\n          <line x1=\"32\" y1=\"36\" x2=\"32\" y2=\"25\"/>\n          <line x1=\"32\" y1=\"36\" x2=\"40\" y2=\"36\"/>\n          <line x1=\"32\" y1=\"10\" x2=\"32\" y2=\"17\"/>\n          <line x1=\"26\" y1=\"10\" x2=\"38\" y2=\"10\"/>\n          <line x1=\"50\" y1=\"20\" x2=\"54\" y2=\"16\"/>\n        <\/svg>\n        <div class=\"label\">Prep Time:<br><b>10 Min<\/b><\/div>\n      <\/div>\n      <div class=\"divider\"><\/div>\n      <div class=\"stat\">\n        <svg width=\"30\" height=\"30\" viewBox=\"0 0 64 64\" fill=\"none\" stroke=\"#2b2b2b\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\n          <circle cx=\"32\" cy=\"36\" r=\"19\"/>\n          <line x1=\"32\" y1=\"36\" x2=\"32\" y2=\"25\"/>\n          <line x1=\"32\" y1=\"36\" x2=\"40\" y2=\"36\"/>\n          <line x1=\"32\" y1=\"10\" x2=\"32\" y2=\"17\"/>\n          <line x1=\"26\" y1=\"10\" x2=\"38\" y2=\"10\"/>\n          <line x1=\"50\" y1=\"20\" x2=\"54\" y2=\"16\"/>\n        <\/svg>\n        <div class=\"label\">Cook Time:<br><b>10 Min<\/b><\/div>\n      <\/div>\n    <\/div>\n\n    <div class=\"rule thin\"><\/div>\n\n    <div class=\"content\">\n      <div class=\"col-ingredients\">\n        <h2>Ingredients<\/h2>\n\n        <ul>\n                  <li>2 quarts apple cider<\/li>\n                  <li>5 cups pineapple juice<\/li>\n                  <li>2 cups orange juice<\/li>\n                  <li>1 cup lemon juice<\/li>\n                  <li>1 cup brown sugar<\/li>\n                  <li>1 cinnamon stick<\/li>\n                  <li>1 tsp whole cloves<\/li>\n                <\/ul>\n      <\/div>\n\n      <div class=\"col-directions\">\n        <h2>Directions<\/h2>\n        <ol>\n          <li>Mix all ingredients and bring to a simmer until the sugar is fully dissolved.<\/li>\n          <li>Transfer to a crockpot and keep warm for serving — it holds for several hours for a party.<\/li>\n          <li>Adults can add a splash of apple brandy (such as Laird&#x27;s Apple Jack) to their mug.<\/li>\n          <li>Refrigerate leftovers; microwave a mug for 30 seconds to reheat.<\/li>\n        <\/ol>\n      <\/div>\n    <\/div>\n    \n  <\/div>\n<\/body>\n<\/html>\n"}

const card = document.getElementById('card');
const label = document.getElementById('label');
const counter = document.getElementById('counter');
const picker = document.getElementById('picker');
let i = 0;

RECIPES.forEach((r, n) => {
  const opt = document.createElement('option');
  opt.value = n;
  opt.textContent = r.title + ' — ' + r.author;
  picker.appendChild(opt);
});

function show(n) {
  i = (n + RECIPES.length) % RECIPES.length;
  const r = RECIPES[i];
  card.srcdoc = r.html;
  label.textContent = r.author;
  counter.textContent = (i + 1) + ' / ' + RECIPES.length;
  picker.value = i;
}

document.getElementById('prev').onclick = () => show(i - 1);
document.getElementById('next').onclick = () => show(i + 1);
picker.onchange = (e) => show(+e.target.value);
document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowLeft') show(i - 1);
  else if (e.key === 'ArrowRight') show(i + 1);
});

function fit() {
  const sw = (window.innerWidth - 180) / 576;
  const sh = (window.innerHeight - 230) / 384;
  const scale = Math.max(0.6, Math.min(2.2, sw, sh));
  document.documentElement.style.setProperty('--scale', scale);
}
window.addEventListener('resize', fit);
fit();
show(0);
</script>
</body>
