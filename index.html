<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Recipes</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --card-w: 576px; --card-h: 384px; }
  body {
    background: #efe9da;
    color: #2b2b2b;
    font-family: "Optima", "Gill Sans", Avenir, sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 18px;
    padding: 24px 16px;
  }
  header { text-align: center; }
  h1 {
    font-family: "Didot", "Bodoni 72", "Baskerville", Georgia, serif;
    font-weight: 400;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    font-size: 22px;
  }
  .meta {
    margin-top: 4px;
    font-size: 12px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: #6f685a;
  }

  .stage { display: flex; align-items: center; gap: 22px; }

  .frame-wrap {
    width: calc(var(--card-w) * var(--scale));
    height: calc(var(--card-h) * var(--scale));
    box-shadow: 0 14px 40px rgba(0, 0, 0, 0.22);
    border-radius: 3px;
    overflow: hidden;
    background: #fdfcf7;
  }
  .frame-wrap iframe {
    width: var(--card-w);
    height: var(--card-h);
    border: 0;
    transform: scale(var(--scale));
    transform-origin: top left;
    display: block;
  }

  .nav {
    border: 1px solid #b9b1a0;
    background: #fbf8f0;
    color: #2b2b2b;
    width: 46px;
    height: 46px;
    border-radius: 50%;
    font-size: 20px;
    cursor: pointer;
    flex: none;
    transition: background 0.15s, transform 0.1s;
  }
  .nav:hover { background: #fff; }
  .nav:active { transform: scale(0.94); }

  .controls { display: flex; align-items: center; gap: 14px; }
  .counter { font-size: 12px; letter-spacing: 0.12em; color: #6f685a; min-width: 64px; text-align: center; }
  select {
    font: inherit;
    font-size: 13px;
    padding: 6px 10px;
    border: 1px solid #b9b1a0;
    border-radius: 4px;
    background: #fbf8f0;
    color: #2b2b2b;
    max-width: 70vw;
  }
  .hint { font-size: 11px; letter-spacing: 0.1em; color: #8a8275; text-transform: uppercase; }
</style>
</head>
<body>
  <header>
    <h1>Family Recipes</h1>
    <div class="meta" id="label"></div>
  </header>

  <div class="stage">
    <button class="nav" id="prev" aria-label="Previous recipe">&#8249;</button>
    <div class="frame-wrap">
      <iframe id="card" title="Recipe card"></iframe>
    </div>
    <button class="nav" id="next" aria-label="Next recipe">&#8250;</button>
  </div>

  <div class="controls">
    <span class="counter" id="counter"></span>
    <select id="picker"></select>
  </div>
  <div class="hint">Use &#8592; / &#8594; arrow keys to flip</div>

5 V31 M57 15 C53 19 53 28 57 31\"/>\n          <line x1=\"57\" y1=\"31\" x2=\"57\" y2=\"49\"/>\n        <\/svg>\n        <div class=\"label\"><b>~7 lb<\/b><\/div>\n      <\/div>\n      <div class=\"divider\"><\/div>\n      <div class=\"stat\">\n        <svg width=\"30\" height=\"30\" viewBox=\"0 0 64 64\" fill=\"none\" stroke=\"#2b2b2b\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\n          <circle cx=\"32\" cy=\"36\" r=\"19\"/>\n          <line x1=\"32\" y1=\"36\" x2=\"32\" y2=\"25\"/>\n          <line x1=\"32\" y1=\"36\" x2=\"40\" y2=\"36\"/>\n          <line x1=\"32\" y1=\"10\" x2=\"32\" y2=\"17\"/>\n          <line x1=\"26\" y1=\"10\" x2=\"38\" y2=\"10\"/>\n          <line x1=\"50\" y1=\"20\" x2=\"54\" y2=\"16\"/>\n        <\/svg>\n        <div class=\"label\">Prep Time:<br><b>30 Min + Overnight<\/b><\/div>\n      <\/div>\n      <div class=\"divider\"><\/div>\n      <div class=\"stat\">\n        <svg width=\"30\" height=\"30\" viewBox=\"0 0 64 64\" fill=\"none\" stroke=\"#2b2b2b\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\n          <circle cx=\"32\" cy=\"36\" r=\"19\"/>\n          <line x1=\"32\" y1=\"36\" x2=\"32\" y2=\"25\"/>\n          <line x1=\"32\" y1=\"36\" x2=\"40\" y2=\"36\"/>\n          <line x1=\"32\" y1=\"10\" x2=\"32\" y2=\"17\"/>\n          <line x1=\"26\" y1=\"10\" x2=\"38\" y2=\"10\"/>\n          <line x1=\"50\" y1=\"20\" x2=\"54\" y2=\"16\"/>\n        <\/svg>\n        <div class=\"label\">Cook Time:<br><b>4 Hr<\/b><\/div>\n      <\/div>\n    <\/div>\n\n    <div class=\"rule thin\"><\/div>\n\n    <div class=\"content\">\n      <div class=\"col-ingredients\">\n        <h2>Ingredients<\/h2>\n\n        <div class=\"subhead\">Meat &amp; Rice:<\/div>\n        <ul>\n                  <li>2 kg pork shoulder<\/li>\n                  <li>400 g chicken liver<\/li>\n                  <li>2.4 kg cooked rice<\/li>\n                  <li>32mm natural hog casing<\/li>\n                <\/ul>\n        <div class=\"subhead\">Aromatics:<\/div>\n        <ul>\n                  <li>4 stalks celery, diced<\/li>\n                  <li>2 medium onions, diced<\/li>\n                  <li>1 bell pepper, diced<\/li>\n                  <li>5 serrano peppers, seeded and diced<\/li>\n                  <li>1 bunch green onions, sliced<\/li>\n                <\/ul>\n        <div class=\"subhead\">Seasoning:<\/div>\n        <ul>\n                  <li>66 g salt + 6 g Cure #1<\/li>\n                  <li>24 g granulated garlic, 6 g cayenne<\/li>\n                  <li>12 g each white pepper, black pepper, paprika, and thyme<\/li>\n                <\/ul>\n      <\/div>\n\n      <div class=\"col-directions\">\n        <h2>Directions<\/h2>\n        <ol>\n          <li>Combine the pork, liver, and seasoning; refrigerate overnight.<\/li>\n          <li>Add the celery, onions, bell pepper, and serranos to a pot with the meat and enough water to cover.<\/li>\n          <li>Simmer 4 hr, then remove the meat and vegetables, reserving the liquid.<\/li>\n          <li>Crush the meat and vegetables, then mix in the cooked rice.<\/li>\n          <li>Stir in ~2 cups reserved liquid, taking as much fat as possible; add more until the consistency is right.<\/li>\n          <li>Stir in the green onions, then stuff into the casings.<\/li>\n        <\/ol>\n      <\/div>\n    <\/div>\n    \n  <\/div>\n<\/body>\n<\/html>\n"},

 <path d=\"M57 15 V31 M57 15 C53 19 53 28 57 31\"/>\n          <line x1=\"57\" y1=\"31\" x2=\"57\" y2=\"49\"/>\n        <\/svg>\n        <div class=\"label\"><b>2 Servings<\/b><\/div>\n      <\/div>\n      <div class=\"divider\"><\/div>\n      <div class=\"stat\">\n        <svg width=\"30\" height=\"30\" viewBox=\"0 0 64 64\" fill=\"none\" stroke=\"#2b2b2b\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\n          <circle cx=\"32\" cy=\"36\" r=\"19\"/>\n          <line x1=\"32\" y1=\"36\" x2=\"32\" y2=\"25\"/>\n          <line x1=\"32\" y1=\"36\" x2=\"40\" y2=\"36\"/>\n          <line x1=\"32\" y1=\"10\" x2=\"32\" y2=\"17\"/>\n          <line x1=\"26\" y1=\"10\" x2=\"38\" y2=\"10\"/>\n          <line x1=\"50\" y1=\"20\" x2=\"54\" y2=\"16\"/>\n        <\/svg>\n        <div class=\"label\">Prep Time:<br><b>10 Min<\/b><\/div>\n      <\/div>\n      <div class=\"divider\"><\/div>\n      <div class=\"stat\">\n        <svg width=\"30\" height=\"30\" viewBox=\"0 0 64 64\" fill=\"none\" stroke=\"#2b2b2b\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\n          <circle cx=\"32\" cy=\"36\" r=\"19\"/>\n          <line x1=\"32\" y1=\"36\" x2=\"32\" y2=\"25\"/>\n          <line x1=\"32\" y1=\"36\" x2=\"40\" y2=\"36\"/>\n          <line x1=\"32\" y1=\"10\" x2=\"32\" y2=\"17\"/>\n          <line x1=\"26\" y1=\"10\" x2=\"38\" y2=\"10\"/>\n          <line x1=\"50\" y1=\"20\" x2=\"54\" y2=\"16\"/>\n        <\/svg>\n        <div class=\"label\">Cook Time:<br><b>Porridge Setting<\/b><\/div>\n      <\/div>\n    <\/div>\n\n    <div class=\"rule thin\"><\/div>\n\n    <div class=\"content\">\n      <div class=\"col-ingredients\">\n        <h2>Ingredients<\/h2>\n\n        <div class=\"subhead\">Congee:<\/div>\n        <ul>\n                  <li>½ rice cooker cup jasmine rice<\/li>\n                  <li>water, to the fill line<\/li>\n                  <li>1 heaping tsp Better than Bouillon Roasted Chicken<\/li>\n                  <li>1″ knob ginger, peeled<\/li>\n                  <li>4 large garlic cloves<\/li>\n                  <li>1 tbsp light soy sauce<\/li>\n                  <li>1 large chicken thigh<\/li>\n                  <li>salt<\/li>\n                <\/ul>\n        <div class=\"subhead\">To Serve:<\/div>\n        <ul>\n                  <li>1 fried egg<\/li>\n                  <li>cubed fried Spam<\/li>\n                  <li>sliced green onions<\/li>\n                  <li>1 tsp chili garlic oil<\/li>\n                <\/ul>\n      <\/div>\n\n      <div class=\"col-directions\">\n        <h2>Directions<\/h2>\n        <ol>\n          <li>Add the jasmine rice to the rice cooker and fill with water to the fill line.<\/li>\n          <li>Stir in the bouillon paste and soy sauce.<\/li>\n          <li>Microplane the ginger and garlic directly into the pot.<\/li>\n          <li>Debone the chicken thigh, season with salt, and slice against the grain. Add it to the pot, skin and all.<\/li>\n          <li>Cook on the porridge setting.<\/li>\n          <li>Serve topped with a fried egg, cubed fried Spam, sliced green onions, and chili garlic oil.<\/li>\n        <\/ol>\n      <\/div>\n    <\/div>\n    \n  <\/div>\n<\/body>\n<\/html>\n"},

ville\", sans-serif;\n    font-weight: 500;\n    letter-spacing: 0.18em;\n    text-transform: uppercase;\n    font-size: 10pt;\n    color: #333;\n    margin-bottom: 5px;\n  }\n\n  .subhead {\n    font-weight: 700;\n    font-size: 7pt;\n    margin: 4px 0 1px;\n  }\n  .subhead:first-of-type { margin-top: 0; }\n\n  ul { list-style: none; }\n  ul li {\n    position: relative;\n    font-size: 6.7pt;\n    line-height: 1.28;\n    padding-left: 9px;\n    margin-bottom: 1.5px;\n  }\n  ul li::before {\n    content: \"\";\n    position: absolute;\n    left: 0; top: 4.5px;\n    width: 2.6px; height: 2.6px;\n    border-radius: 50%;\n    background: #2b2b2b;\n  }\n\n  ol { list-style: none; counter-reset: step; }\n  ol li {\n    position: relative;\n    counter-increment: step;\n    font-size: 6.7pt;\n    line-height: 1.26;\n    padding-left: 13px;\n    margin-bottom: 2.5px;\n  }\n  ol li::before {\n    content: counter(step) \".\";\n    position: absolute;\n    left: 0; top: 0;\n    font-weight: 600;\n    font-size: 6.7pt;\n  }\n  .lead { font-weight: 700; }\n\n  /* optional attribution footer, pinned to the bottom of the card */\n  .source {\n    margin-top: auto;\n    padding-top: 5px;\n    text-align: center;\n    font-style: italic;\n    font-size: 6pt;\n    letter-spacing: 0.03em;\n    color: #8a8275;\n  }\n<\/style>\n<\/head>\n<body>\n  <div class=\"card\">\n    <h1 class=\"title\">Decoux Family Gumbo<\/h1>\n    <div class=\"rule\"><\/div>\n\n    <div class=\"stats\">\n      <div class=\"stat\">\n        <svg width=\"30\" height=\"30\" viewBox=\"0 0 64 64\" fill=\"none\" stroke=\"#2b2b2b\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\n          <circle cx=\"34\" cy=\"32\" r=\"15\"/>\n          <circle cx=\"34\" cy=\"32\" r=\"9\"/>\n          <line x1=\"5\" y1=\"15\" x2=\"5\" y2=\"25\"/>\n          <line x1=\"9\" y1=\"15\" x2=\"9\" y2=\"25\"/>\n          <line x1=\"13\" y1=\"15\" x2=\"13\" y2=\"25\"/>\n          <path d=\"M5 25 H13 M9 25 V49\"/>\n          <path d=\"M57 15 V31 M57 15 C53 19 53 28 57 31\"/>\n          <line x1=\"57\" y1=\"31\" x2=\"57\" y2=\"49\"/>\n        <\/svg>\n        <div class=\"label\"><b>1 Large Pot<\/b><\/div>\n      <\/div>\n      <div class=\"divider\"><\/div>\n      <div class=\"stat\">\n        <svg width=\"30\" height=\"30\" viewBox=\"0 0 64 64\" fill=\"none\" stroke=\"#2b2b2b\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\n          <circle cx=\"32\" cy=\"36\" r=\"19\"/>\n          <line x1=\"32\" y1=\"36\" x2=\"32\" y2=\"25\"/>\n          <line x1=\"32\" y1=\"36\" x2=\"40\" y2=\"36\"/>\n          <line x1=\"32\" y1=\"10\" x2=\"32\" y2=\"17\"/>\n          <line x1=\"26\" y1=\"10\" x2=\"38\" y2=\"10\"/>\n          <line x1=\"50\" y1=\"20\" x2=\"54\" y2=\"16\"/>\n        <\/svg>\n        <div class=\"label\">Prep Time:<br><b>Roux 2–3 Hrs<\/b><\/div>\n      <\/div>\n      <div class=\"divider\"><\/div>\n      <div class=\"stat\">\n        <svg width=\"30\" height=\"30\" viewBox=\"0 0 64 64\" fill=\"none\" stroke=\"#2b2b2b\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\n          <circle cx=\"32\" cy=\"36\" r=\"19\"/>\n          <line x1=\"32\" y1=\"36\" x2=\"32\" y2=\"25\"/>\n          <line x1=\"32\" y1=\"36\" x2=\"40\" y2=\"36\"/>\n          <line x1=\"32\" y1=\"10\" x2=\"32\" y2=\"17\"/>\n          <line x1=\"26\" y1=\"10\" x2=\"38\" y2=\"10\"/>\n          <line x1=\"50\" y1=\"20\" x2=\"54\" y2=\"16\"/>\n        <\/svg>\n        <div class=\"label\">Total Time:<br><b>~6 Hrs<\/b><\/div>\n      <\/div>\n    <\/div>\n\n    <div class=\"rule thin\"><\/div>\n\n    <div class=\"content\">\n      <div class=\"col-ingredients\">\n        <h2>Ingredients<\/h2>\n\n        <div class=\"subhead\">Roux:<\/div>\n        <ul>\n                  <li>6 heaping spoonfuls flour<\/li>\n                  <li>~1 cup oil (or skimmed gumbo grease)<\/li>\n                  <li>water<\/li>\n                <\/ul>\n        <div class=\"subhead\">Gumbo:<\/div>\n        <ul>\n                  <li>~2 cups cooked roux (4 cups for two chickens)<\/li>\n                  <li>3 banana peppers, seeds in<\/li>\n                  <li>1½ onions<\/li>\n                  <li>3 heaping tbsp dried parsley flakes<\/li>\n                  <li>~1 cup green onion tops<\/li>\n                  <li>1½ tbsp salt<\/li>\n                  <li>cayenne, to taste<\/li>\n                  <li>smoked beef or pork sausage<\/li>\n                  <li>1 large chicken, cut up, plus extra drumsticks<\/li>\n                  <li>water<\/li>\n                <\/ul>\n      <\/div>\n\n      <div class=\"col-directions\">\n        <h2>Directions<\/h2>\n        <ol>\n          <li><span class=\"lead\">Make the roux:<\/span> Scoop 6 heaping spoonfuls of flour into a heavy skillet and add ~1 cup oil to form a thick paste. Cook and stir on low until a rich chocolate color, 45 minutes to 1½ hours. If it turns black or smells burnt, discard and start over.<\/li>\n          <li>Remove any oil on top, add a little water, and simmer uncovered 1½ to 2 hours. This makes enough for several gumbos; store with a little oil on top in the fridge, or freeze indefinitely.<\/li>\n          <li><span class=\"lead\">Make the gumbo:<\/span> Put an inch of water in a large deep pot and add ~2 cups cooked roux. Cook and stir, adding more roux as needed, until a rich brown color — it tends to stick to the bottom.<\/li>\n          <li>Puree the banana peppers and onions with a little water; add to the gumbo along with the parsley, green onion tops, salt, and cayenne. Cook about 20 minutes.<\/li>\n          <li>Add the sausage, cut-up chicken, and extra drumsticks. Add more water, partially cover, and cook on low until the chicken is done, skimming as it cooks. (Turkey necks also make a good gumbo.)<\/li>\n        <\/ol>\n      <\/div>\n    <\/div>\n    \n  <\/div>\n<\/body>\n<\/html>\n"},

rville\", sans-serif;\n    font-weight: 500;\n    letter-spacing: 0.18em;\n    text-transform: uppercase;\n    font-size: 10pt;\n    color: #333;\n    margin-bottom: 5px;\n  }\n\n  .subhead {\n    font-weight: 700;\n    font-size: 7pt;\n    margin: 4px 0 1px;\n  }\n  .subhead:first-of-type { margin-top: 0; }\n\n  ul { list-style: none; }\n  ul li {\n    position: relative;\n    font-size: 6.7pt;\n    line-height: 1.28;\n    padding-left: 9px;\n    margin-bottom: 1.5px;\n  }\n  ul li::before {\n    content: \"\";\n    position: absolute;\n    left: 0; top: 4.5px;\n    width: 2.6px; height: 2.6px;\n    border-radius: 50%;\n    background: #2b2b2b;\n  }\n\n  ol { list-style: none; counter-reset: step; }\n  ol li {\n    position: relative;\n    counter-increment: step;\n    font-size: 6.7pt;\n    line-height: 1.26;\n    padding-left: 13px;\n    margin-bottom: 2.5px;\n  }\n  ol li::before {\n    content: counter(step) \".\";\n    position: absolute;\n    left: 0; top: 0;\n    font-weight: 600;\n    font-size: 6.7pt;\n  }\n  .lead { font-weight: 700; }\n\n  /* optional attribution footer, pinned to the bottom of the card */\n  .source {\n    margin-top: auto;\n    padding-top: 5px;\n    text-align: center;\n    font-style: italic;\n    font-size: 6pt;\n    letter-spacing: 0.03em;\n    color: #8a8275;\n  }\n<\/style>\n<\/head>\n<body>\n  <div class=\"card\">\n    <h1 class=\"title\">Liguori Family Gumbo<\/h1>\n    <div class=\"rule\"><\/div>\n\n    <div class=\"stats\">\n      <div class=\"stat\">\n        <svg width=\"30\" height=\"30\" viewBox=\"0 0 64 64\" fill=\"none\" stroke=\"#2b2b2b\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\n          <circle cx=\"34\" cy=\"32\" r=\"15\"/>\n          <circle cx=\"34\" cy=\"32\" r=\"9\"/>\n          <line x1=\"5\" y1=\"15\" x2=\"5\" y2=\"25\"/>\n          <line x1=\"9\" y1=\"15\" x2=\"9\" y2=\"25\"/>\n          <line x1=\"13\" y1=\"15\" x2=\"13\" y2=\"25\"/>\n          <path d=\"M5 25 H13 M9 25 V49\"/>\n          <path d=\"M57 15 V31 M57 15 C53 19 53 28 57 31\"/>\n          <line x1=\"57\" y1=\"31\" x2=\"57\" y2=\"49\"/>\n        <\/svg>\n        <div class=\"label\"><b>1 Large Pot<\/b><\/div>\n      <\/div>\n      <div class=\"divider\"><\/div>\n      <div class=\"stat\">\n        <svg width=\"30\" height=\"30\" viewBox=\"0 0 64 64\" fill=\"none\" stroke=\"#2b2b2b\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\n          <circle cx=\"32\" cy=\"36\" r=\"19\"/>\n          <line x1=\"32\" y1=\"36\" x2=\"32\" y2=\"25\"/>\n          <line x1=\"32\" y1=\"36\" x2=\"40\" y2=\"36\"/>\n          <line x1=\"32\" y1=\"10\" x2=\"32\" y2=\"17\"/>\n          <line x1=\"26\" y1=\"10\" x2=\"38\" y2=\"10\"/>\n          <line x1=\"50\" y1=\"20\" x2=\"54\" y2=\"16\"/>\n        <\/svg>\n        <div class=\"label\">Prep Time:<br><b>30 Min<\/b><\/div>\n      <\/div>\n      <div class=\"divider\"><\/div>\n      <div class=\"stat\">\n        <svg width=\"30\" height=\"30\" viewBox=\"0 0 64 64\" fill=\"none\" stroke=\"#2b2b2b\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\n          <circle cx=\"32\" cy=\"36\" r=\"19\"/>\n          <line x1=\"32\" y1=\"36\" x2=\"32\" y2=\"25\"/>\n          <line x1=\"32\" y1=\"36\" x2=\"40\" y2=\"36\"/>\n          <line x1=\"32\" y1=\"10\" x2=\"32\" y2=\"17\"/>\n          <line x1=\"26\" y1=\"10\" x2=\"38\" y2=\"10\"/>\n          <line x1=\"50\" y1=\"20\" x2=\"54\" y2=\"16\"/>\n        <\/svg>\n        <div class=\"label\">Cook Time:<br><b>~4 Hrs<\/b><\/div>\n      <\/div>\n    <\/div>\n\n    <div class=\"rule thin\"><\/div>\n\n    <div class=\"content\">\n      <div class=\"col-ingredients\">\n        <h2>Ingredients<\/h2>\n\n        <ul>\n                  <li>½ lb smoked Andouille sausage (or any smoked sausage)<\/li>\n                  <li>1½ lb duck meat (see Duck Stock &amp; Fat)<\/li>\n                  <li>1 qt duck stock<\/li>\n                  <li>4 oz duck fat<\/li>\n                  <li>4 oz flour<\/li>\n                  <li>2 celery stalks<\/li>\n                  <li>1 bell pepper<\/li>\n                  <li>1 jalapeño<\/li>\n                  <li>1 medium onion<\/li>\n                  <li>4 cloves garlic<\/li>\n                  <li>2 bay leaves<\/li>\n                  <li>1 tbsp filé powder<\/li>\n                  <li>½ cup green onions, thinly sliced<\/li>\n                  <li>salt and pepper, to taste<\/li>\n                <\/ul>\n      <\/div>\n\n      <div class=\"col-directions\">\n        <h2>Directions<\/h2>\n        <ol>\n          <li><span class=\"lead\">Make the roux:<\/span> Preheat oven to 350°F. Combine the duck fat and flour in a heavy stock pot and bake 1½ hours, stirring every 30 minutes, to a brick-colored roux.<\/li>\n          <li>Slice the sausage into ½″ slices and chop the duck meat into ½″ chunks.<\/li>\n          <li>Dice the celery, bell pepper, onion, and jalapeño and add to the roux. Stir 7–10 minutes until the vegetables soften.<\/li>\n          <li>Add the garlic and stir 2 minutes more.<\/li>\n          <li>Add the bay leaves and duck stock and bring to a boil.<\/li>\n          <li>Add the duck meat and sausage and simmer 2½ hours.<\/li>\n          <li>Season with salt and pepper, stir in the filé powder, and take off the heat.<\/li>\n          <li>Add the green onions and serve over rice.<\/li>\n        <\/ol>\n      <\/div>\n    <\/div>\n    \n  <\/div>\n<\/body>\n<\/html>\n"},
{title: "Duck Stock & Fat", author: "Anthony", html: "<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n<meta charset=\"utf-8\">\n<style>\n  @page { size: 6in 4in; margin: 0; }\n  * { box-sizing: border-box; margin: 0; padding: 0; }\n\n  html, body { width: 6in; height: 4in; }\n\n  body {\n    background: #fdfcf7;\n    color: #2b2b2b;\n    font-family: \"Baskerville\", \"Hoefler Text\", Georgia, serif;\n    padding: 0.18in;\n    -webkit-print-color-adjust: exact;\n    print-color-adjust: exact;\n  }\n\n  .card {\n    border: 1px solid #d8d3c4;\n    width: 100%;\n    height: 100%;\n    padding: 0.16in 0.22in 0.14in;\n    display: flex;\n    flex-direction: column;\n  }\n\n  h1.title {\n    text-align: center;\n    font-family: \"Didot\", \"Bodoni 72\", \"Baskerville\", Georgia, serif;\n    font-weight: 400;\n    font-size: 21pt;\n    letter-spacing: 0.12em;\n    text-transform: uppercase;\n    padding-bottom: 4px;\n  }\n\n  .rule { border-bottom: 1px solid #2b2b2b; }\n  .rule.thin { border-bottom: 1px solid #555; }\n\n  /* stats row */\n  .stats {\n    display: flex;\n    align-items: center;\n    justify-content: space-between;\n    padding: 6px 4px;\n  }\n  .stat {\n    display: flex;\n    align-items: center;\n    gap: 7px;\n    flex: 1;\n    justify-content: center;\n  }\n  .stat svg { flex: none; }\n  .stat .label {\n    font-family: \"Optima\", \"Gill Sans\", \"Baskerville\", sans-serif;\n    letter-spacing: 0.14em;\n    font-size: 6.6pt;\n    line-height: 1.25;\n    text-transform: uppercase;\n    color: #3a3a3a;\n  }\n  .stat .label b { font-weight: 600; }\n  .divider { width: 1px; align-self: stretch; background: #c9c4b6; margin: 2px 0; }\n\n  /* body columns */\n  .content {\n    display: flex;\n    flex: 1;\n    padding-top: 8px;\n    min-height: 0;\n  }\n  .col-ingredients { width: 38%; padding-right: 10px; }\n  .col-directions { width: 62%; padding-left: 12px; border-left: 1px solid #2b2b2b; }\n\n  h2 {\n    font-family: \"Optima\", \"Gill Sans\", \"Baskerville\", sans-serif;\n    font-weight: 500;\n    letter-spacing: 0.18em;\n    text-transform: uppercase;\n    font-size: 10pt;\n    color: #333;\n    margin-bottom: 5px;\n  }\n\n  .subhead {\n    font-weight: 700;\n    font-size: 7pt;\n    margin: 4px 0 1px;\n  }\n  .subhead:first-of-type { margin-top: 0; }\n\n  ul { list-style: none; }\n  ul li {\n    position: relative;\n    font-size: 6.7pt;\n    line-height: 1.28;\n    padding-left: 9px;\n    margin-bottom: 1.5px;\n  }\n  ul li::before {\n    content: \"\";\n    position: absolute;\n    left: 0; top: 4.5px;\n    width: 2.6px; height: 2.6px;\n    border-radius: 50%;\n    background: #2b2b2b;\n  }\n\n  ol { list-style: none; counter-reset: step; }\n  ol li {\n    position: relative;\n    counter-increment: step;\n    font-size: 6.7pt;\n    line-height: 1.26;\n    padding-left: 13px;\n    margin-bottom: 2.5px;\n  }\n  ol li::before {\n    content: counter(step) \".\";\n    position: absolute;\n    left: 0; top: 0;\n    font-weight: 600;\n    font-size: 6.7pt;\n  }\n  .lead { font-weight: 700; }\n\n  /* optional attribution footer, pinned to the bottom of the card */\n  .source {\n    margin-top: auto;\n    padding-top: 5px;\n    text-align: center;\n    font-style: italic;\n    font-size: 6pt;\n    letter-spacing: 0.03em;\n    color: #8a8275;\n  }\n<\/style>\n<\/head>\n<body>\n  <div class=\"card\">\n    <h1 class=\"title\">Duck Stock &amp; Fat<\/h1>\n    <div class=\"rule\"><\/div>\n\n    <div class=\"stats\">\n      <div class=\"stat\">\n        <svg width=\"30\" height=\"30\" viewBox=\"0 0 64 64\" fill=\"none\" stroke=\"#2b2b2b\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\n          <circle cx=\"34\" cy=\"32\" r=\"15\"/>\n          <circle cx=\"34\" cy=\"32\" r=\"9\"/>\n          <line x1=\"5\" y1=\"15\" x2=\"5\" y2=\"25\"/>\n          <line x1=\"9\" y1=\"15\" x2=\"9\" y2=\"25\"/>\n          <line x1=\"13\" y1=\"15\" x2=\"13\" y2=\"25\"/>\n          <path d=\"M5 25 H13 M9 25 V49\"/>\n          <path d=\"M57 15 V31 M57 15 C53 19 53 28 57 31\"/>\n          <line x1=\"57\" y1=\"31\" x2=\"57\" y2=\"49\"/>\n        <\/svg>\n        <div class=\"label\"><b>~3 Qt Stock<\/b><\/div>\n      <\/div>\n      <div class=\"divider\"><\/div>\n      <div class=\"stat\">\n        <svg width=\"30\" height=\"30\" viewBox=\"0 0 64 64\" fill=\"none\" stroke=\"#2b2b2b\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\n          <circle cx=\"32\" cy=\"36\" r=\"19\"/>\n          <line x1=\"32\" y1=\"36\" x2=\"32\" y2=\"25\"/>\n          <line x1=\"32\" y1=\"36\" x2=\"40\" y2=\"36\"/>\n          <line x1=\"32\" y1=\"10\" x2=\"32\" y2=\"17\"/>\n          <line x1=\"26\" y1=\"10\" x2=\"38\" y2=\"10\"/>\n          <line x1=\"50\" y1=\"20\" x2=\"54\" y2=\"16\"/>\n        <\/svg>\n        <div class=\"label\">Prep Time:<br><b>30 Min<\/b><\/div>\n      <\/div>\n      <div class=\"divider\"><\/div>\n      <div class=\"stat\">\n        <svg width=\"30\" height=\"30\" viewBox=\"0 0 64 64\" fill=\"none\" stroke=\"#2b2b2b\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\n          <circle cx=\"32\" cy=\"36\" r=\"19\"/>\n          <line x1=\"32\" y1=\"36\" x2=\"32\" y2=\"25\"/>\n          <line x1=\"32\" y1=\"36\" x2=\"40\" y2=\"36\"/>\n          <line x1=\"32\" y1=\"10\" x2=\"32\" y2=\"17\"/>\n          <line x1=\"26\" y1=\"10\" x2=\"38\" y2=\"10\"/>\n          <line x1=\"50\" y1=\"20\" x2=\"54\" y2=\"16\"/>\n        <\/svg>\n        <div class=\"label\">Cook Time:<br><b>2½+ Hrs<\/b><\/div>\n      <\/div>\n    <\/div>\n\n    <div class=\"rule thin\"><\/div>\n\n    <div class=\"content\">\n      <div class=\"col-ingredients\">\n        <h2>Ingredients<\/h2>\n\n        <ul>\n                  <li>1 whole fresh duck<\/li>\n                  <li>2 stalks celery<\/li>\n                  <li>2 carrots<\/li>\n                  <li>1 medium onion<\/li>\n                  <li>4 cloves garlic<\/li>\n                  <li>2 bay leaves<\/li>\n                  <li>a dozen whole peppercorns<\/li>\n                  <li>4 quarts water<\/li>\n                <\/ul>\n      <\/div>\n\n      <div class=\"col-directions\">\n        <h2>Directions<\/h2>\n        <ol>\n          <li>Remove the neck and organs from the cavity and place in a stock pot.<\/li>\n          <li>Remove the breasts and the thighs/legs; debone the thighs and legs. Reserve all this meat (~1½ lb) and refrigerate for the gumbo.<\/li>\n          <li>Carefully remove the skin and add it to the pot. Roughly break up the carcass and add it along with the leg/thigh bones.<\/li>\n          <li>Roughly chop the celery, carrots, and onion; smash the garlic. Add to the pot with the bay leaves, peppercorns, and water.<\/li>\n          <li>Simmer at least 2½ hours, skimming as needed.<\/li>\n          <li>Strain the stock into jars, removing the fat into a separate container. Chill and refrigerate.<\/li>\n          <li>Yields about 3 quarts stock, 5 oz duck fat, and ~1½ lb duck meat.<\/li>\n        <\/ol>\n      <\/div>\n    <\/div>\n    \n  <\/div>\n<\/body>\n<\/html>\n"},

le\", sans-serif;\n    font-weight: 500;\n    letter-spacing: 0.18em;\n    text-transform: uppercase;\n    font-size: 10pt;\n    color: #333;\n    margin-bottom: 5px;\n  }\n\n  .subhead {\n    font-weight: 700;\n    font-size: 7pt;\n    margin: 4px 0 1px;\n  }\n  .subhead:first-of-type { margin-top: 0; }\n\n  ul { list-style: none; }\n  ul li {\n    position: relative;\n    font-size: 6.7pt;\n    line-height: 1.28;\n    padding-left: 9px;\n    margin-bottom: 1.5px;\n  }\n  ul li::before {\n    content: \"\";\n    position: absolute;\n    left: 0; top: 4.5px;\n    width: 2.6px; height: 2.6px;\n    border-radius: 50%;\n    background: #2b2b2b;\n  }\n\n  ol { list-style: none; counter-reset: step; }\n  ol li {\n    position: relative;\n    counter-increment: step;\n    font-size: 6.7pt;\n    line-height: 1.26;\n    padding-left: 13px;\n    margin-bottom: 2.5px;\n  }\n  ol li::before {\n    content: counter(step) \".\";\n    position: absolute;\n    left: 0; top: 0;\n    font-weight: 600;\n    font-size: 6.7pt;\n  }\n  .lead { font-weight: 700; }\n\n  /* optional attribution footer, pinned to the bottom of the card */\n  .source {\n    margin-top: auto;\n    padding-top: 5px;\n    text-align: center;\n    font-style: italic;\n    font-size: 6pt;\n    letter-spacing: 0.03em;\n    color: #8a8275;\n  }\n<\/style>\n<\/head>\n<body>\n  <div class=\"card\">\n    <h1 class=\"title\">No-Fuss Focaccia<\/h1>\n    <div class=\"rule\"><\/div>\n\n    <div class=\"stats\">\n      <div class=\"stat\">\n        <svg width=\"30\" height=\"30\" viewBox=\"0 0 64 64\" fill=\"none\" stroke=\"#2b2b2b\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\n          <circle cx=\"34\" cy=\"32\" r=\"15\"/>\n          <circle cx=\"34\" cy=\"32\" r=\"9\"/>\n          <line x1=\"5\" y1=\"15\" x2=\"5\" y2=\"25\"/>\n          <line x1=\"9\" y1=\"15\" x2=\"9\" y2=\"25\"/>\n          <line x1=\"13\" y1=\"15\" x2=\"13\" y2=\"25\"/>\n          <path d=\"M5 25 H13 M9 25 V49\"/>\n          <path d=\"M57 15 V31 M57 15 C53 19 53 28 57 31\"/>\n          <line x1=\"57\" y1=\"31\" x2=\"57\" y2=\"49\"/>\n        <\/svg>\n        <div class=\"label\"><b>One 9×13″ Loaf<\/b><\/div>\n      <\/div>\n      <div class=\"divider\"><\/div>\n      <div class=\"stat\">\n        <svg width=\"30\" height=\"30\" viewBox=\"0 0 64 64\" fill=\"none\" stroke=\"#2b2b2b\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\n          <circle cx=\"32\" cy=\"36\" r=\"19\"/>\n          <line x1=\"32\" y1=\"36\" x2=\"32\" y2=\"25\"/>\n          <line x1=\"32\" y1=\"36\" x2=\"40\" y2=\"36\"/>\n          <line x1=\"32\" y1=\"10\" x2=\"32\" y2=\"17\"/>\n          <line x1=\"26\" y1=\"10\" x2=\"38\" y2=\"10\"/>\n          <line x1=\"50\" y1=\"20\" x2=\"54\" y2=\"16\"/>\n        <\/svg>\n        <div class=\"label\">Prep Time:<br><b>7 Min<\/b><\/div>\n      <\/div>\n      <div class=\"divider\"><\/div>\n      <div class=\"stat\">\n        <svg width=\"30\" height=\"30\" viewBox=\"0 0 64 64\" fill=\"none\" stroke=\"#2b2b2b\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\n          <circle cx=\"32\" cy=\"36\" r=\"19\"/>\n          <line x1=\"32\" y1=\"36\" x2=\"32\" y2=\"25\"/>\n          <line x1=\"32\" y1=\"36\" x2=\"40\" y2=\"36\"/>\n          <line x1=\"32\" y1=\"10\" x2=\"32\" y2=\"17\"/>\n          <line x1=\"26\" y1=\"10\" x2=\"38\" y2=\"10\"/>\n          <line x1=\"50\" y1=\"20\" x2=\"54\" y2=\"16\"/>\n        <\/svg>\n        <div class=\"label\">Cook Time:<br><b>25–30 Min<\/b><\/div>\n      <\/div>\n    <\/div>\n\n    <div class=\"rule thin\"><\/div>\n\n    <div class=\"content\">\n      <div class=\"col-ingredients\">\n        <h2>Ingredients<\/h2>\n\n        <div class=\"subhead\">Dough:<\/div>\n        <ul>\n                  <li>5 tbsp (60g) olive oil, divided<\/li>\n                  <li>1½ cups (340g) warm water<\/li>\n                  <li>1¼ tsp (8g) table salt<\/li>\n                  <li>3½ cups (420g) all-purpose flour<\/li>\n                  <li>1 tbsp instant yeast<\/li>\n                  <li>4 tsp pizza dough flavor (optional)<\/li>\n                  <li>¼ cup (28g) cheddar cheese powder (optional)<\/li>\n                <\/ul>\n        <div class=\"subhead\">Topping:<\/div>\n        <ul>\n                  <li>1 tbsp (13g) olive oil, for drizzling<\/li>\n                  <li>pizza seasoning (optional)<\/li>\n                <\/ul>\n      <\/div>\n\n      <div class=\"col-directions\">\n        <h2>Directions<\/h2>\n        <ol>\n          <li>Lightly grease a 9×13″ pan with non-stick spray, then drizzle about 2 tbsp of the olive oil over it.<\/li>\n          <li>Combine the remaining 3 tbsp olive oil with the rest of the dough ingredients and beat at high speed for 60 seconds.<\/li>\n          <li>Scoop the sticky batter into the prepared pan, cover, and let rise at room temperature for 60 minutes, until puffy.<\/li>\n          <li>While the dough rises, preheat the oven to 375°F.<\/li>\n          <li>Gently poke the dough all over with your index finger.<\/li>\n          <li>Drizzle lightly with olive oil and sprinkle with pizza seasoning and/or dried herbs as desired.<\/li>\n          <li>Bake until golden brown, 25 to 30 minutes.<\/li>\n          <li>Remove from the oven, wait 5 minutes, then turn out onto a rack. Serve warm or at room temperature.<\/li>\n        <\/ol>\n      <\/div>\n    <\/div>\n    <div class=\"source\">Adapted from King Arthur Baking&#x27;s No-Fuss Focaccia<\/div>\n  <\/div>\n<\/body>\n<\/html>\n"},

", sans-serif;\n    font-weight: 500;\n    letter-spacing: 0.18em;\n    text-transform: uppercase;\n    font-size: 10pt;\n    color: #333;\n    margin-bottom: 5px;\n  }\n\n  .subhead {\n    font-weight: 700;\n    font-size: 7pt;\n    margin: 4px 0 1px;\n  }\n  .subhead:first-of-type { margin-top: 0; }\n\n  ul { list-style: none; }\n  ul li {\n    position: relative;\n    font-size: 6.7pt;\n    line-height: 1.28;\n    padding-left: 9px;\n    margin-bottom: 1.5px;\n  }\n  ul li::before {\n    content: \"\";\n    position: absolute;\n    left: 0; top: 4.5px;\n    width: 2.6px; height: 2.6px;\n    border-radius: 50%;\n    background: #2b2b2b;\n  }\n\n  ol { list-style: none; counter-reset: step; }\n  ol li {\n    position: relative;\n    counter-increment: step;\n    font-size: 6.7pt;\n    line-height: 1.26;\n    padding-left: 13px;\n    margin-bottom: 2.5px;\n  }\n  ol li::before {\n    content: counter(step) \".\";\n    position: absolute;\n    left: 0; top: 0;\n    font-weight: 600;\n    font-size: 6.7pt;\n  }\n  .lead { font-weight: 700; }\n\n  /* optional attribution footer, pinned to the bottom of the card */\n  .source {\n    margin-top: auto;\n    padding-top: 5px;\n    text-align: center;\n    font-style: italic;\n    font-size: 6pt;\n    letter-spacing: 0.03em;\n    color: #8a8275;\n  }\n<\/style>\n<\/head>\n<body>\n  <div class=\"card\">\n    <h1 class=\"title\">Grandma Pizza<\/h1>\n    <div class=\"rule\"><\/div>\n\n    <div class=\"stats\">\n      <div class=\"stat\">\n        <svg width=\"30\" height=\"30\" viewBox=\"0 0 64 64\" fill=\"none\" stroke=\"#2b2b2b\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\n          <circle cx=\"34\" cy=\"32\" r=\"15\"/>\n          <circle cx=\"34\" cy=\"32\" r=\"9\"/>\n          <line x1=\"5\" y1=\"15\" x2=\"5\" y2=\"25\"/>\n          <line x1=\"9\" y1=\"15\" x2=\"9\" y2=\"25\"/>\n          <line x1=\"13\" y1=\"15\" x2=\"13\" y2=\"25\"/>\n          <path d=\"M5 25 H13 M9 25 V49\"/>\n          <path d=\"M57 15 V31 M57 15 C53 19 53 28 57 31\"/>\n          <line x1=\"57\" y1=\"31\" x2=\"57\" y2=\"49\"/>\n        <\/svg>\n        <div class=\"label\"><b>1 Large Pizza<\/b><\/div>\n      <\/div>\n      <div class=\"divider\"><\/div>\n      <div class=\"stat\">\n        <svg width=\"30\" height=\"30\" viewBox=\"0 0 64 64\" fill=\"none\" stroke=\"#2b2b2b\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\n          <circle cx=\"32\" cy=\"36\" r=\"19\"/>\n          <line x1=\"32\" y1=\"36\" x2=\"32\" y2=\"25\"/>\n          <line x1=\"32\" y1=\"36\" x2=\"40\" y2=\"36\"/>\n          <line x1=\"32\" y1=\"10\" x2=\"32\" y2=\"17\"/>\n          <line x1=\"26\" y1=\"10\" x2=\"38\" y2=\"10\"/>\n          <line x1=\"50\" y1=\"20\" x2=\"54\" y2=\"16\"/>\n        <\/svg>\n        <div class=\"label\">Prep Time:<br><b>20 Min<\/b><\/div>\n      <\/div>\n      <div class=\"divider\"><\/div>\n      <div class=\"stat\">\n        <svg width=\"30\" height=\"30\" viewBox=\"0 0 64 64\" fill=\"none\" stroke=\"#2b2b2b\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\n          <circle cx=\"32\" cy=\"36\" r=\"19\"/>\n          <line x1=\"32\" y1=\"36\" x2=\"32\" y2=\"25\"/>\n          <line x1=\"32\" y1=\"36\" x2=\"40\" y2=\"36\"/>\n          <line x1=\"32\" y1=\"10\" x2=\"32\" y2=\"17\"/>\n          <line x1=\"26\" y1=\"10\" x2=\"38\" y2=\"10\"/>\n          <line x1=\"50\" y1=\"20\" x2=\"54\" y2=\"16\"/>\n        <\/svg>\n        <div class=\"label\">Cook Time:<br><b>12–15 Min<\/b><\/div>\n      <\/div>\n    <\/div>\n\n    <div class=\"rule thin\"><\/div>\n\n    <div class=\"content\">\n      <div class=\"col-ingredients\">\n        <h2>Ingredients<\/h2>\n\n        <div class=\"subhead\">Crust:<\/div>\n        <ul>\n                  <li>2 cups (212g) Italian-Style Flour<\/li>\n                  <li>2 cups (240g) all-purpose flour<\/li>\n                  <li>1 tbsp pizza dough flavor (optional)<\/li>\n                  <li>1¼ tsp (8g) table salt<\/li>\n                  <li>2 tsp instant yeast<\/li>\n                  <li>1¼ cups (283g) lukewarm water<\/li>\n                  <li>2 tbsp (25g) olive oil<\/li>\n                <\/ul>\n        <div class=\"subhead\">For the pan:<\/div>\n        <ul>\n                  <li>2 tbsp (25g) olive oil<\/li>\n                <\/ul>\n        <div class=\"subhead\">Topping:<\/div>\n        <ul>\n                  <li>3 cups (340g) shredded mozzarella<\/li>\n                  <li>1 can (12.3oz) Rao&#x27;s pizza sauce<\/li>\n                  <li>pepperoni<\/li>\n                  <li>Locatelli pecorino romano, to finish<\/li>\n                <\/ul>\n      <\/div>\n\n      <div class=\"col-directions\">\n        <h2>Directions<\/h2>\n        <ol>\n          <li><span class=\"lead\">To make the crust:<\/span> Combine all crust ingredients in a large bowl; mix and knead by hand, mixer, or bread machine to form a smooth, elastic dough.<\/li>\n          <li>Place dough in a large bowl, cover with plastic wrap, and refrigerate at least 4 hours or up to 24 hours.<\/li>\n          <li><span class=\"lead\">To assemble &amp; bake:<\/span> Preheat the oven to 500°F.<\/li>\n          <li>Add 2 tbsp olive oil to a grandma-style pan or 18×13″ baking sheet, coating it. A dark pan gives the crispiest crust.<\/li>\n          <li>Turn the dough into the pan, gently stretching to the edges and corners. If it shrinks back, cover and rest 10 minutes, then resume.<\/li>\n          <li>Cover and let rest 30 minutes, until slightly puffed.<\/li>\n          <li>Top the crust with mozzarella all the way to the edges, dollop or spread the sauce over the cheese, then arrange pepperoni on top.<\/li>\n          <li>Bake in the bottom third of the oven 12 to 15 minutes, until the cheese is bubbly and the crust is golden.<\/li>\n          <li>Finish with grated Locatelli pecorino romano.<\/li>\n        <\/ol>\n      <\/div>\n    <\/div>\n    <div class=\"source\">Adapted from King Arthur Baking&#x27;s Grandma Pizza<\/div>\n  <\/div>\n<\/body>\n<\/html>\n"},

ville\", sans-serif;\n    font-weight: 500;\n    letter-spacing: 0.18em;\n    text-transform: uppercase;\n    font-size: 10pt;\n    color: #333;\n    margin-bottom: 5px;\n  }\n\n  .subhead {\n    font-weight: 700;\n    font-size: 7pt;\n    margin: 4px 0 1px;\n  }\n  .subhead:first-of-type { margin-top: 0; }\n\n  ul { list-style: none; }\n  ul li {\n    position: relative;\n    font-size: 6.7pt;\n    line-height: 1.28;\n    padding-left: 9px;\n    margin-bottom: 1.5px;\n  }\n  ul li::before {\n    content: \"\";\n    position: absolute;\n    left: 0; top: 4.5px;\n    width: 2.6px; height: 2.6px;\n    border-radius: 50%;\n    background: #2b2b2b;\n  }\n\n  ol { list-style: none; counter-reset: step; }\n  ol li {\n    position: relative;\n    counter-increment: step;\n    font-size: 6.7pt;\n    line-height: 1.26;\n    padding-left: 13px;\n    margin-bottom: 2.5px;\n  }\n  ol li::before {\n    content: counter(step) \".\";\n    position: absolute;\n    left: 0; top: 0;\n    font-weight: 600;\n    font-size: 6.7pt;\n  }\n  .lead { font-weight: 700; }\n\n  /* optional attribution footer, pinned to the bottom of the card */\n  .source {\n    margin-top: auto;\n    padding-top: 5px;\n    text-align: center;\n    font-style: italic;\n    font-size: 6pt;\n    letter-spacing: 0.03em;\n    color: #8a8275;\n  }\n<\/style>\n<\/head>\n<body>\n  <div class=\"card\">\n    <h1 class=\"title\">Loaded Baked Potato<\/h1>\n    <div class=\"rule\"><\/div>\n\n    <div class=\"stats\">\n      <div class=\"stat\">\n        <svg width=\"30\" height=\"30\" viewBox=\"0 0 64 64\" fill=\"none\" stroke=\"#2b2b2b\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\n          <circle cx=\"34\" cy=\"32\" r=\"15\"/>\n          <circle cx=\"34\" cy=\"32\" r=\"9\"/>\n          <line x1=\"5\" y1=\"15\" x2=\"5\" y2=\"25\"/>\n          <line x1=\"9\" y1=\"15\" x2=\"9\" y2=\"25\"/>\n          <line x1=\"13\" y1=\"15\" x2=\"13\" y2=\"25\"/>\n          <path d=\"M5 25 H13 M9 25 V49\"/>\n          <path d=\"M57 15 V31 M57 15 C53 19 53 28 57 31\"/>\n          <line x1=\"57\" y1=\"31\" x2=\"57\" y2=\"49\"/>\n        <\/svg>\n        <div class=\"label\"><b>6 Halves<\/b><\/div>\n      <\/div>\n      <div class=\"divider\"><\/div>\n      <div class=\"stat\">\n        <svg width=\"30\" height=\"30\" viewBox=\"0 0 64 64\" fill=\"none\" stroke=\"#2b2b2b\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\n          <circle cx=\"32\" cy=\"36\" r=\"19\"/>\n          <line x1=\"32\" y1=\"36\" x2=\"32\" y2=\"25\"/>\n          <line x1=\"32\" y1=\"36\" x2=\"40\" y2=\"36\"/>\n          <line x1=\"32\" y1=\"10\" x2=\"32\" y2=\"17\"/>\n          <line x1=\"26\" y1=\"10\" x2=\"38\" y2=\"10\"/>\n          <line x1=\"50\" y1=\"20\" x2=\"54\" y2=\"16\"/>\n        <\/svg>\n        <div class=\"label\">Prep Time:<br><b>10 Min<\/b><\/div>\n      <\/div>\n      <div class=\"divider\"><\/div>\n      <div class=\"stat\">\n        <svg width=\"30\" height=\"30\" viewBox=\"0 0 64 64\" fill=\"none\" stroke=\"#2b2b2b\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\n          <circle cx=\"32\" cy=\"36\" r=\"19\"/>\n          <line x1=\"32\" y1=\"36\" x2=\"32\" y2=\"25\"/>\n          <line x1=\"32\" y1=\"36\" x2=\"40\" y2=\"36\"/>\n          <line x1=\"32\" y1=\"10\" x2=\"32\" y2=\"17\"/>\n          <line x1=\"26\" y1=\"10\" x2=\"38\" y2=\"10\"/>\n          <line x1=\"50\" y1=\"20\" x2=\"54\" y2=\"16\"/>\n        <\/svg>\n        <div class=\"label\">Cook Time:<br><b>1 Hr<\/b><\/div>\n      <\/div>\n    <\/div>\n\n    <div class=\"rule thin\"><\/div>\n\n    <div class=\"content\">\n      <div class=\"col-ingredients\">\n        <h2>Ingredients<\/h2>\n\n        <ul>\n                  <li>3 medium russet potatoes<\/li>\n                  <li>pulled pork<\/li>\n                  <li>BBQ sauce (Stubb&#x27;s mesquite is good)<\/li>\n                  <li>shredded cheddar cheese<\/li>\n                  <li>sour cream<\/li>\n                  <li>3 strips bacon, crumbled<\/li>\n                  <li>butter<\/li>\n                  <li>olive oil<\/li>\n                  <li>salt and pepper<\/li>\n                  <li>chives<\/li>\n                <\/ul>\n      <\/div>\n\n      <div class=\"col-directions\">\n        <h2>Directions<\/h2>\n        <ol>\n          <li>Cook the bacon ahead of time until crispy and break into bits.<\/li>\n          <li>Place the potatoes in a plastic bag and drizzle with oil, salt, and pepper, coating well.<\/li>\n          <li>Bake the potatoes at 350°F for 60 minutes.<\/li>\n          <li>With 25 minutes left, combine the pulled pork and BBQ sauce in a foil pouch and place in the oven to reheat.<\/li>\n          <li>Cut the potatoes in half lengthwise and place on a foil-lined baking sheet.<\/li>\n          <li>Lightly break up the potato insides and add a pad of butter to each.<\/li>\n          <li>Top with pulled pork, then sprinkle with shredded cheddar.<\/li>\n          <li>Broil until the cheese is melted.<\/li>\n          <li>Top each half with a dollop of sour cream, bacon bits, and chives, then serve.<\/li>\n        <\/ol>\n      <\/div>\n    <\/div>\n    \n  <\/div>\n<\/body>\n<\/html>\n"},

n                  <li>4 tbsp tomato paste<\/li>\n                  <li>1 cup bread crumbs<\/li>\n                  <li>1½ tbsp dried basil<\/li>\n                  <li>1½ tsp salt<\/li>\n                  <li>1½ tsp pepper<\/li>\n                  <li>1½ tsp garlic powder<\/li>\n                  <li>½ tsp crushed red pepper flakes<\/li>\n                <\/ul>\n      <\/div>\n\n      <div class=\"col-directions\">\n        <h2>Directions<\/h2>\n        <ol>\n          <li>Preheat the oven to 375°F.<\/li>\n          <li>Combine all ingredients and mix well.<\/li>\n          <li>Divide into 32 meatballs.<\/li>\n          <li>Place on a greased half sheet pan.<\/li>\n          <li>Bake 30 minutes.<\/li>\n          <li>Let cool, then place under the broiler to crisp the outside.<\/li>\n        <\/ol>\n      <\/div>\n    <\/div>\n    \n  <\/div>\n<\/body>\n<\/html>\n"},

"M57 15 V31 M57 15 C53 19 53 28 57 31\"/>\n          <line x1=\"57\" y1=\"31\" x2=\"57\" y2=\"49\"/>\n        <\/svg>\n        <div class=\"label\"><b>2 Servings<\/b><\/div>\n      <\/div>\n      <div class=\"divider\"><\/div>\n      <div class=\"stat\">\n        <svg width=\"30\" height=\"30\" viewBox=\"0 0 64 64\" fill=\"none\" stroke=\"#2b2b2b\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\n          <circle cx=\"32\" cy=\"36\" r=\"19\"/>\n          <line x1=\"32\" y1=\"36\" x2=\"32\" y2=\"25\"/>\n          <line x1=\"32\" y1=\"36\" x2=\"40\" y2=\"36\"/>\n          <line x1=\"32\" y1=\"10\" x2=\"32\" y2=\"17\"/>\n          <line x1=\"26\" y1=\"10\" x2=\"38\" y2=\"10\"/>\n          <line x1=\"50\" y1=\"20\" x2=\"54\" y2=\"16\"/>\n        <\/svg>\n        <div class=\"label\">Prep Time:<br><b>10 Min<\/b><\/div>\n      <\/div>\n      <div class=\"divider\"><\/div>\n      <div class=\"stat\">\n        <svg width=\"30\" height=\"30\" viewBox=\"0 0 64 64\" fill=\"none\" stroke=\"#2b2b2b\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\n          <circle cx=\"32\" cy=\"36\" r=\"19\"/>\n          <line x1=\"32\" y1=\"36\" x2=\"32\" y2=\"25\"/>\n          <line x1=\"32\" y1=\"36\" x2=\"40\" y2=\"36\"/>\n          <line x1=\"32\" y1=\"10\" x2=\"32\" y2=\"17\"/>\n          <line x1=\"26\" y1=\"10\" x2=\"38\" y2=\"10\"/>\n          <line x1=\"50\" y1=\"20\" x2=\"54\" y2=\"16\"/>\n        <\/svg>\n        <div class=\"label\">Cook Time:<br><b>15 Min<\/b><\/div>\n      <\/div>\n    <\/div>\n\n    <div class=\"rule thin\"><\/div>\n\n    <div class=\"content\">\n      <div class=\"col-ingredients\">\n        <h2>Ingredients<\/h2>\n\n        <ul>\n                  <li>6 oz spaghetti<\/li>\n                  <li>2.5 oz diced pancetta<\/li>\n                  <li>2 eggs<\/li>\n                  <li>1 oz Locatelli pecorino romano<\/li>\n                  <li>pinch of salt<\/li>\n                  <li>pinch of cracked black pepper<\/li>\n                  <li>Italian parsley, to garnish<\/li>\n                <\/ul>\n      <\/div>\n\n      <div class=\"col-directions\">\n        <h2>Directions<\/h2>\n        <ol>\n          <li>Start boiling salted water for the spaghetti.<\/li>\n          <li>Sauté the pancetta over low heat.<\/li>\n          <li>Mix 1 egg and 1 egg yolk with the grated cheese, then season with salt and pepper and set aside.<\/li>\n          <li>Once the water boils, turn off the heat under the pancetta and let the pan cool.<\/li>\n          <li>Add the pasta to the boiling water and cook per the package instructions.<\/li>\n          <li>When al dente, remove the pasta and add it directly to the pancetta.<\/li>\n          <li>Lightly toss the pasta and pancetta, then add the egg/cheese mixture.<\/li>\n          <li>Add a little pasta cooking water to thin the sauce if needed.<\/li>\n          <li>Serve with cracked pepper, grated cheese, and chopped parsley.<\/li>\n        <\/ol>\n      <\/div>\n    <\/div>\n    \n  <\/div>\n<\/body>\n<\/html>\n"},

th d=\"M57 15 V31 M57 15 C53 19 53 28 57 31\"/>\n          <line x1=\"57\" y1=\"31\" x2=\"57\" y2=\"49\"/>\n        <\/svg>\n        <div class=\"label\"><b>1 Large Pot<\/b><\/div>\n      <\/div>\n      <div class=\"divider\"><\/div>\n      <div class=\"stat\">\n        <svg width=\"30\" height=\"30\" viewBox=\"0 0 64 64\" fill=\"none\" stroke=\"#2b2b2b\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\n          <circle cx=\"32\" cy=\"36\" r=\"19\"/>\n          <line x1=\"32\" y1=\"36\" x2=\"32\" y2=\"25\"/>\n          <line x1=\"32\" y1=\"36\" x2=\"40\" y2=\"36\"/>\n          <line x1=\"32\" y1=\"10\" x2=\"32\" y2=\"17\"/>\n          <line x1=\"26\" y1=\"10\" x2=\"38\" y2=\"10\"/>\n          <line x1=\"50\" y1=\"20\" x2=\"54\" y2=\"16\"/>\n        <\/svg>\n        <div class=\"label\">Prep Time:<br><b>15 Min<\/b><\/div>\n      <\/div>\n      <div class=\"divider\"><\/div>\n      <div class=\"stat\">\n        <svg width=\"30\" height=\"30\" viewBox=\"0 0 64 64\" fill=\"none\" stroke=\"#2b2b2b\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\n          <circle cx=\"32\" cy=\"36\" r=\"19\"/>\n          <line x1=\"32\" y1=\"36\" x2=\"32\" y2=\"25\"/>\n          <line x1=\"32\" y1=\"36\" x2=\"40\" y2=\"36\"/>\n          <line x1=\"32\" y1=\"10\" x2=\"32\" y2=\"17\"/>\n          <line x1=\"26\" y1=\"10\" x2=\"38\" y2=\"10\"/>\n          <line x1=\"50\" y1=\"20\" x2=\"54\" y2=\"16\"/>\n        <\/svg>\n        <div class=\"label\">Cook Time:<br><b>1 Hr<\/b><\/div>\n      <\/div>\n    <\/div>\n\n    <div class=\"rule thin\"><\/div>\n\n    <div class=\"content\">\n      <div class=\"col-ingredients\">\n        <h2>Ingredients<\/h2>\n\n        <ul>\n                  <li>1 batch tomato gravy (see Tomato Gravy)<\/li>\n                  <li>36 meatballs (see Meatballs)<\/li>\n                  <li>2 packages Italian sausage (10 sausages)<\/li>\n                  <li>fresh basil<\/li>\n                <\/ul>\n      <\/div>\n\n      <div class=\"col-directions\">\n        <h2>Directions<\/h2>\n        <ol>\n          <li>After cooking the gravy, remove the pork ribs.<\/li>\n          <li>Cook the Italian sausage fully on the grill.<\/li>\n          <li>Cut the sausage into 1½″ slices and add to the gravy.<\/li>\n          <li>Add the meatballs to the gravy.<\/li>\n          <li>Coarsely chop the basil and add to the gravy.<\/li>\n          <li>Cook an additional 30 to 60 minutes.<\/li>\n          <li>Serve over pasta with bread and butter.<\/li>\n        <\/ol>\n      <\/div>\n    <\/div>\n    \n  <\/div>\n<\/body>\n<\/html>\n"},

lle\", sans-serif;\n    font-weight: 500;\n    letter-spacing: 0.18em;\n    text-transform: uppercase;\n    font-size: 10pt;\n    color: #333;\n    margin-bottom: 5px;\n  }\n\n  .subhead {\n    font-weight: 700;\n    font-size: 7pt;\n    margin: 4px 0 1px;\n  }\n  .subhead:first-of-type { margin-top: 0; }\n\n  ul { list-style: none; }\n  ul li {\n    position: relative;\n    font-size: 6.7pt;\n    line-height: 1.28;\n    padding-left: 9px;\n    margin-bottom: 1.5px;\n  }\n  ul li::before {\n    content: \"\";\n    position: absolute;\n    left: 0; top: 4.5px;\n    width: 2.6px; height: 2.6px;\n    border-radius: 50%;\n    background: #2b2b2b;\n  }\n\n  ol { list-style: none; counter-reset: step; }\n  ol li {\n    position: relative;\n    counter-increment: step;\n    font-size: 6.7pt;\n    line-height: 1.26;\n    padding-left: 13px;\n    margin-bottom: 2.5px;\n  }\n  ol li::before {\n    content: counter(step) \".\";\n    position: absolute;\n    left: 0; top: 0;\n    font-weight: 600;\n    font-size: 6.7pt;\n  }\n  .lead { font-weight: 700; }\n\n  /* optional attribution footer, pinned to the bottom of the card */\n  .source {\n    margin-top: auto;\n    padding-top: 5px;\n    text-align: center;\n    font-style: italic;\n    font-size: 6pt;\n    letter-spacing: 0.03em;\n    color: #8a8275;\n  }\n<\/style>\n<\/head>\n<body>\n  <div class=\"card\">\n    <h1 class=\"title\">Texas Gut Busters<\/h1>\n    <div class=\"rule\"><\/div>\n\n    <div class=\"stats\">\n      <div class=\"stat\">\n        <svg width=\"30\" height=\"30\" viewBox=\"0 0 64 64\" fill=\"none\" stroke=\"#2b2b2b\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\n          <circle cx=\"34\" cy=\"32\" r=\"15\"/>\n          <circle cx=\"34\" cy=\"32\" r=\"9\"/>\n          <line x1=\"5\" y1=\"15\" x2=\"5\" y2=\"25\"/>\n          <line x1=\"9\" y1=\"15\" x2=\"9\" y2=\"25\"/>\n          <line x1=\"13\" y1=\"15\" x2=\"13\" y2=\"25\"/>\n          <path d=\"M5 25 H13 M9 25 V49\"/>\n          <path d=\"M57 15 V31 M57 15 C53 19 53 28 57 31\"/>\n          <line x1=\"57\" y1=\"31\" x2=\"57\" y2=\"49\"/>\n        <\/svg>\n        <div class=\"label\"><b>~5 lb (2 kg Meat)<\/b><\/div>\n      <\/div>\n      <div class=\"divider\"><\/div>\n      <div class=\"stat\">\n        <svg width=\"30\" height=\"30\" viewBox=\"0 0 64 64\" fill=\"none\" stroke=\"#2b2b2b\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\n          <circle cx=\"32\" cy=\"36\" r=\"19\"/>\n          <line x1=\"32\" y1=\"36\" x2=\"32\" y2=\"25\"/>\n          <line x1=\"32\" y1=\"36\" x2=\"40\" y2=\"36\"/>\n          <line x1=\"32\" y1=\"10\" x2=\"32\" y2=\"17\"/>\n          <line x1=\"26\" y1=\"10\" x2=\"38\" y2=\"10\"/>\n          <line x1=\"50\" y1=\"20\" x2=\"54\" y2=\"16\"/>\n        <\/svg>\n        <div class=\"label\">Prep Time:<br><b>1 Hr + Overnight<\/b><\/div>\n      <\/div>\n      <div class=\"divider\"><\/div>\n      <div class=\"stat\">\n        <svg width=\"30\" height=\"30\" viewBox=\"0 0 64 64\" fill=\"none\" stroke=\"#2b2b2b\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\n          <circle cx=\"32\" cy=\"36\" r=\"19\"/>\n          <line x1=\"32\" y1=\"36\" x2=\"32\" y2=\"25\"/>\n          <line x1=\"32\" y1=\"36\" x2=\"40\" y2=\"36\"/>\n          <line x1=\"32\" y1=\"10\" x2=\"32\" y2=\"17\"/>\n          <line x1=\"26\" y1=\"10\" x2=\"38\" y2=\"10\"/>\n          <line x1=\"50\" y1=\"20\" x2=\"54\" y2=\"16\"/>\n        <\/svg>\n        <div class=\"label\">Cook Time:<br><b>5–6 Hr<\/b><\/div>\n      <\/div>\n    <\/div>\n\n    <div class=\"rule thin\"><\/div>\n\n    <div class=\"content\">\n      <div class=\"col-ingredients\">\n        <h2>Ingredients<\/h2>\n\n        <div class=\"subhead\">Meat:<\/div>\n        <ul>\n                  <li>1 kg beef chuck<\/li>\n                  <li>1 kg pork shoulder<\/li>\n                  <li>32mm natural hog casing<\/li>\n                <\/ul>\n        <div class=\"subhead\">Spice Mix:<\/div>\n        <ul>\n                  <li>72.5 g BBQ Rub (see BBQ Rub)<\/li>\n                  <li>60 g nonfat milk powder<\/li>\n                  <li>5 g Cure #1<\/li>\n                  <li>150 g cold water<\/li>\n                <\/ul>\n      <\/div>\n\n      <div class=\"col-directions\">\n        <h2>Directions<\/h2>\n        <ol>\n          <li><span class=\"lead\">Mix the spice mix:<\/span> combine the BBQ rub, milk powder, and Cure #1.<\/li>\n          <li>Cube the beef and pork to fit the grinder.<\/li>\n          <li>Grind all the meat once through a coarse plate.<\/li>\n          <li>Grind half the ground meat again through the coarse plate for varied texture.<\/li>\n          <li>Add the spice mix and cold water; mix thoroughly 5–10 min until extremely sticky.<\/li>\n          <li>Stuff into the hog casing.<\/li>\n          <li>Cure uncovered in the fridge overnight.<\/li>\n          <li>Smoke at 150°F for 2 hr, raise to 170°F for 1–2 hr, then 190°F until internal temp reaches 155°F.<\/li>\n          <li>Plunge into an ice bath to cool, then hang at room temperature to bloom at least 1 hr.<\/li>\n        <\/ol>\n      <\/div>\n    <\/div>\n    \n  <\/div>\n<\/body>\n<\/html>\n"},

th d=\"M57 15 V31 M57 15 C53 19 53 28 57 31\"/>\n          <line x1=\"57\" y1=\"31\" x2=\"57\" y2=\"49\"/>\n        <\/svg>\n        <div class=\"label\"><b>1 Large Pot<\/b><\/div>\n      <\/div>\n      <div class=\"divider\"><\/div>\n      <div class=\"stat\">\n        <svg width=\"30\" height=\"30\" viewBox=\"0 0 64 64\" fill=\"none\" stroke=\"#2b2b2b\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\n          <circle cx=\"32\" cy=\"36\" r=\"19\"/>\n          <line x1=\"32\" y1=\"36\" x2=\"32\" y2=\"25\"/>\n          <line x1=\"32\" y1=\"36\" x2=\"40\" y2=\"36\"/>\n          <line x1=\"32\" y1=\"10\" x2=\"32\" y2=\"17\"/>\n          <line x1=\"26\" y1=\"10\" x2=\"38\" y2=\"10\"/>\n          <line x1=\"50\" y1=\"20\" x2=\"54\" y2=\"16\"/>\n        <\/svg>\n        <div class=\"label\">Prep Time:<br><b>20 Min<\/b><\/div>\n      <\/div>\n      <div class=\"divider\"><\/div>\n      <div class=\"stat\">\n        <svg width=\"30\" height=\"30\" viewBox=\"0 0 64 64\" fill=\"none\" stroke=\"#2b2b2b\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\n          <circle cx=\"32\" cy=\"36\" r=\"19\"/>\n          <line x1=\"32\" y1=\"36\" x2=\"32\" y2=\"25\"/>\n          <line x1=\"32\" y1=\"36\" x2=\"40\" y2=\"36\"/>\n          <line x1=\"32\" y1=\"10\" x2=\"32\" y2=\"17\"/>\n          <line x1=\"26\" y1=\"10\" x2=\"38\" y2=\"10\"/>\n          <line x1=\"50\" y1=\"20\" x2=\"54\" y2=\"16\"/>\n        <\/svg>\n        <div class=\"label\">Cook Time:<br><b>3+ Hrs<\/b><\/div>\n      <\/div>\n    <\/div>\n\n    <div class=\"rule thin\"><\/div>\n\n    <div class=\"content\">\n      <div class=\"col-ingredients\">\n        <h2>Ingredients<\/h2>\n\n        <ul>\n                  <li>1 rack St. Louis-style pork ribs<\/li>\n                  <li>3 cans crushed tomato<\/li>\n                  <li>3 cans pureed tomato<\/li>\n                  <li>2 cans water<\/li>\n                  <li>2 small cans tomato paste<\/li>\n                  <li>1 head garlic, minced<\/li>\n                  <li>1 large onion, finely diced<\/li>\n                  <li>1 tbsp oregano<\/li>\n                  <li>1 tbsp thyme<\/li>\n                  <li>1 tbsp dried basil<\/li>\n                  <li>2 tbsp coarsely ground pepper<\/li>\n                  <li>1 tbsp kosher salt<\/li>\n                  <li>½ cup sugar<\/li>\n                  <li>olive oil<\/li>\n                <\/ul>\n      <\/div>\n\n      <div class=\"col-directions\">\n        <h2>Directions<\/h2>\n        <ol>\n          <li>Heat oil in a large stock pot until simmering.<\/li>\n          <li>Remove the membrane from the ribs, trim excess fat, and divide into 2-rib pieces.<\/li>\n          <li>Sear the ribs in small batches until browned on both sides, then set aside.<\/li>\n          <li>Cook the onion until slightly browned and translucent, then add the garlic and cook a couple minutes, careful not to burn.<\/li>\n          <li>Add the crushed and pureed tomatoes, water, and tomato paste.<\/li>\n          <li>Add the herbs, salt, and pepper along with the reserved ribs.<\/li>\n          <li>Simmer at least 3 hours, until the ribs are tender.<\/li>\n          <li>Remove and discard the ribs (or reserve for Sunday Gravy).<\/li>\n        <\/ol>\n      <\/div>\n    <\/div>\n    \n  <\/div>\n<\/body>\n<\/html>\n"},

rville\", sans-serif;\n    font-weight: 500;\n    letter-spacing: 0.18em;\n    text-transform: uppercase;\n    font-size: 10pt;\n    color: #333;\n    margin-bottom: 5px;\n  }\n\n  .subhead {\n    font-weight: 700;\n    font-size: 7pt;\n    margin: 4px 0 1px;\n  }\n  .subhead:first-of-type { margin-top: 0; }\n\n  ul { list-style: none; }\n  ul li {\n    position: relative;\n    font-size: 6.7pt;\n    line-height: 1.28;\n    padding-left: 9px;\n    margin-bottom: 1.5px;\n  }\n  ul li::before {\n    content: \"\";\n    position: absolute;\n    left: 0; top: 4.5px;\n    width: 2.6px; height: 2.6px;\n    border-radius: 50%;\n    background: #2b2b2b;\n  }\n\n  ol { list-style: none; counter-reset: step; }\n  ol li {\n    position: relative;\n    counter-increment: step;\n    font-size: 6.7pt;\n    line-height: 1.26;\n    padding-left: 13px;\n    margin-bottom: 2.5px;\n  }\n  ol li::before {\n    content: counter(step) \".\";\n    position: absolute;\n    left: 0; top: 0;\n    font-weight: 600;\n    font-size: 6.7pt;\n  }\n  .lead { font-weight: 700; }\n\n  /* optional attribution footer, pinned to the bottom of the card */\n  .source {\n    margin-top: auto;\n    padding-top: 5px;\n    text-align: center;\n    font-style: italic;\n    font-size: 6pt;\n    letter-spacing: 0.03em;\n    color: #8a8275;\n  }\n<\/style>\n<\/head>\n<body>\n  <div class=\"card\">\n    <h1 class=\"title\">Yellow Chicken Curry<\/h1>\n    <div class=\"rule\"><\/div>\n\n    <div class=\"stats\">\n      <div class=\"stat\">\n        <svg width=\"30\" height=\"30\" viewBox=\"0 0 64 64\" fill=\"none\" stroke=\"#2b2b2b\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\n          <circle cx=\"34\" cy=\"32\" r=\"15\"/>\n          <circle cx=\"34\" cy=\"32\" r=\"9\"/>\n          <line x1=\"5\" y1=\"15\" x2=\"5\" y2=\"25\"/>\n          <line x1=\"9\" y1=\"15\" x2=\"9\" y2=\"25\"/>\n          <line x1=\"13\" y1=\"15\" x2=\"13\" y2=\"25\"/>\n          <path d=\"M5 25 H13 M9 25 V49\"/>\n          <path d=\"M57 15 V31 M57 15 C53 19 53 28 57 31\"/>\n          <line x1=\"57\" y1=\"31\" x2=\"57\" y2=\"49\"/>\n        <\/svg>\n        <div class=\"label\"><b>2 Servings<\/b><\/div>\n      <\/div>\n      <div class=\"divider\"><\/div>\n      <div class=\"stat\">\n        <svg width=\"30\" height=\"30\" viewBox=\"0 0 64 64\" fill=\"none\" stroke=\"#2b2b2b\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\n          <circle cx=\"32\" cy=\"36\" r=\"19\"/>\n          <line x1=\"32\" y1=\"36\" x2=\"32\" y2=\"25\"/>\n          <line x1=\"32\" y1=\"36\" x2=\"40\" y2=\"36\"/>\n          <line x1=\"32\" y1=\"10\" x2=\"32\" y2=\"17\"/>\n          <line x1=\"26\" y1=\"10\" x2=\"38\" y2=\"10\"/>\n          <line x1=\"50\" y1=\"20\" x2=\"54\" y2=\"16\"/>\n        <\/svg>\n        <div class=\"label\">Prep Time:<br><b>10 Min<\/b><\/div>\n      <\/div>\n      <div class=\"divider\"><\/div>\n      <div class=\"stat\">\n        <svg width=\"30\" height=\"30\" viewBox=\"0 0 64 64\" fill=\"none\" stroke=\"#2b2b2b\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\n          <circle cx=\"32\" cy=\"36\" r=\"19\"/>\n          <line x1=\"32\" y1=\"36\" x2=\"32\" y2=\"25\"/>\n          <line x1=\"32\" y1=\"36\" x2=\"40\" y2=\"36\"/>\n          <line x1=\"32\" y1=\"10\" x2=\"32\" y2=\"17\"/>\n          <line x1=\"26\" y1=\"10\" x2=\"38\" y2=\"10\"/>\n          <line x1=\"50\" y1=\"20\" x2=\"54\" y2=\"16\"/>\n        <\/svg>\n        <div class=\"label\">Cook Time:<br><b>25 Min<\/b><\/div>\n      <\/div>\n    <\/div>\n\n    <div class=\"rule thin\"><\/div>\n\n    <div class=\"content\">\n      <div class=\"col-ingredients\">\n        <h2>Ingredients<\/h2>\n\n        <ul>\n                  <li>1 can coconut milk (Chaokoh)<\/li>\n                  <li>50g Mae Ploy curry paste<\/li>\n                  <li>1 chicken breast<\/li>\n                  <li>1 medium russet potato<\/li>\n                  <li>1″ slice of a medium onion, quartered<\/li>\n                  <li>2 tbsp oil<\/li>\n                  <li>2 tsp sugar<\/li>\n                  <li>1 dash fish sauce<\/li>\n                <\/ul>\n      <\/div>\n\n      <div class=\"col-directions\">\n        <h2>Directions<\/h2>\n        <ol>\n          <li>Heat a small pot over medium heat and add the oil.<\/li>\n          <li>Stir in the curry paste and sauté for a minute. If the paste absorbs all the oil, there isn&#x27;t enough oil.<\/li>\n          <li>Turn down the heat and add ½ can of coconut milk.<\/li>\n          <li>Stir until it reaches a gentle simmer. From here on, don&#x27;t over-boil the coconut milk or it will separate.<\/li>\n          <li>Cut the chicken breast into ½″ slices and add to the coconut milk.<\/li>\n          <li>Fill the coconut milk can with water, stir, and add to the pot.<\/li>\n          <li>Add the potato and onion and bring back to a simmer.<\/li>\n          <li>Let simmer 15 minutes.<\/li>\n          <li>Add the sugar and fish sauce, then serve over rice.<\/li>\n        <\/ol>\n      <\/div>\n    <\/div>\n    \n  <\/div>\n<\/body>\n<\/html>\n"},

"/>\n          <path d=\"M57 15 V31 M57 15 C53 19 53 28 57 31\"/>\n          <line x1=\"57\" y1=\"31\" x2=\"57\" y2=\"49\"/>\n        <\/svg>\n        <div class=\"label\"><b>6 Servings<\/b><\/div>\n      <\/div>\n      <div class=\"divider\"><\/div>\n      <div class=\"stat\">\n        <svg width=\"30\" height=\"30\" viewBox=\"0 0 64 64\" fill=\"none\" stroke=\"#2b2b2b\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\n          <circle cx=\"32\" cy=\"36\" r=\"19\"/>\n          <line x1=\"32\" y1=\"36\" x2=\"32\" y2=\"25\"/>\n          <line x1=\"32\" y1=\"36\" x2=\"40\" y2=\"36\"/>\n          <line x1=\"32\" y1=\"10\" x2=\"32\" y2=\"17\"/>\n          <line x1=\"26\" y1=\"10\" x2=\"38\" y2=\"10\"/>\n          <line x1=\"50\" y1=\"20\" x2=\"54\" y2=\"16\"/>\n        <\/svg>\n        <div class=\"label\">Prep Time:<br><b>5 Min<\/b><\/div>\n      <\/div>\n      <div class=\"divider\"><\/div>\n      <div class=\"stat\">\n        <svg width=\"30\" height=\"30\" viewBox=\"0 0 64 64\" fill=\"none\" stroke=\"#2b2b2b\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\n          <circle cx=\"32\" cy=\"36\" r=\"19\"/>\n          <line x1=\"32\" y1=\"36\" x2=\"32\" y2=\"25\"/>\n          <line x1=\"32\" y1=\"36\" x2=\"40\" y2=\"36\"/>\n          <line x1=\"32\" y1=\"10\" x2=\"32\" y2=\"17\"/>\n          <line x1=\"26\" y1=\"10\" x2=\"38\" y2=\"10\"/>\n          <line x1=\"50\" y1=\"20\" x2=\"54\" y2=\"16\"/>\n        <\/svg>\n        <div class=\"label\">Cook Time:<br><b>5 Min<\/b><\/div>\n      <\/div>\n    <\/div>\n\n    <div class=\"rule thin\"><\/div>\n\n    <div class=\"content\">\n      <div class=\"col-ingredients\">\n        <h2>Ingredients<\/h2>\n\n        <ul>\n                  <li>1 (15oz) can butternut squash puree<\/li>\n                  <li>½ cup pasta water<\/li>\n                  <li>½ cup sofrito<\/li>\n                  <li>2 tbsp olive oil<\/li>\n                <\/ul>\n      <\/div>\n\n      <div class=\"col-directions\">\n        <h2>Directions<\/h2>\n        <ol>\n          <li>Combine all ingredients in a small pot and bring to a simmer.<\/li>\n          <li>Store in the fridge for up to a week.<\/li>\n          <li>Also works with canned pumpkin or sweet potato puree — adjust the olive oil and pasta water to reach a sauce consistency.<\/li>\n        <\/ol>\n      <\/div>\n    <\/div>\n    \n  <\/div>\n<\/body>\n<\/html>\n"},

ville\", sans-serif;\n    font-weight: 500;\n    letter-spacing: 0.18em;\n    text-transform: uppercase;\n    font-size: 10pt;\n    color: #333;\n    margin-bottom: 5px;\n  }\n\n  .subhead {\n    font-weight: 700;\n    font-size: 7pt;\n    margin: 4px 0 1px;\n  }\n  .subhead:first-of-type { margin-top: 0; }\n\n  ul { list-style: none; }\n  ul li {\n    position: relative;\n    font-size: 6.7pt;\n    line-height: 1.28;\n    padding-left: 9px;\n    margin-bottom: 1.5px;\n  }\n  ul li::before {\n    content: \"\";\n    position: absolute;\n    left: 0; top: 4.5px;\n    width: 2.6px; height: 2.6px;\n    border-radius: 50%;\n    background: #2b2b2b;\n  }\n\n  ol { list-style: none; counter-reset: step; }\n  ol li {\n    position: relative;\n    counter-increment: step;\n    font-size: 6.7pt;\n    line-height: 1.26;\n    padding-left: 13px;\n    margin-bottom: 2.5px;\n  }\n  ol li::before {\n    content: counter(step) \".\";\n    position: absolute;\n    left: 0; top: 0;\n    font-weight: 600;\n    font-size: 6.7pt;\n  }\n  .lead { font-weight: 700; }\n\n  /* optional attribution footer, pinned to the bottom of the card */\n  .source {\n    margin-top: auto;\n    padding-top: 5px;\n    text-align: center;\n    font-style: italic;\n    font-size: 6pt;\n    letter-spacing: 0.03em;\n    color: #8a8275;\n  }\n<\/style>\n<\/head>\n<body>\n  <div class=\"card\">\n    <h1 class=\"title\">Carrot Raisin Muffins<\/h1>\n    <div class=\"rule\"><\/div>\n\n    <div class=\"stats\">\n      <div class=\"stat\">\n        <svg width=\"30\" height=\"30\" viewBox=\"0 0 64 64\" fill=\"none\" stroke=\"#2b2b2b\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\n          <circle cx=\"34\" cy=\"32\" r=\"15\"/>\n          <circle cx=\"34\" cy=\"32\" r=\"9\"/>\n          <line x1=\"5\" y1=\"15\" x2=\"5\" y2=\"25\"/>\n          <line x1=\"9\" y1=\"15\" x2=\"9\" y2=\"25\"/>\n          <line x1=\"13\" y1=\"15\" x2=\"13\" y2=\"25\"/>\n          <path d=\"M5 25 H13 M9 25 V49\"/>\n          <path d=\"M57 15 V31 M57 15 C53 19 53 28 57 31\"/>\n          <line x1=\"57\" y1=\"31\" x2=\"57\" y2=\"49\"/>\n        <\/svg>\n        <div class=\"label\"><b>12 Muffins<\/b><\/div>\n      <\/div>\n      <div class=\"divider\"><\/div>\n      <div class=\"stat\">\n        <svg width=\"30\" height=\"30\" viewBox=\"0 0 64 64\" fill=\"none\" stroke=\"#2b2b2b\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\n          <circle cx=\"32\" cy=\"36\" r=\"19\"/>\n          <line x1=\"32\" y1=\"36\" x2=\"32\" y2=\"25\"/>\n          <line x1=\"32\" y1=\"36\" x2=\"40\" y2=\"36\"/>\n          <line x1=\"32\" y1=\"10\" x2=\"32\" y2=\"17\"/>\n          <line x1=\"26\" y1=\"10\" x2=\"38\" y2=\"10\"/>\n          <line x1=\"50\" y1=\"20\" x2=\"54\" y2=\"16\"/>\n        <\/svg>\n        <div class=\"label\">Prep Time:<br><b>30 Min<\/b><\/div>\n      <\/div>\n      <div class=\"divider\"><\/div>\n      <div class=\"stat\">\n        <svg width=\"30\" height=\"30\" viewBox=\"0 0 64 64\" fill=\"none\" stroke=\"#2b2b2b\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\n          <circle cx=\"32\" cy=\"36\" r=\"19\"/>\n          <line x1=\"32\" y1=\"36\" x2=\"32\" y2=\"25\"/>\n          <line x1=\"32\" y1=\"36\" x2=\"40\" y2=\"36\"/>\n          <line x1=\"32\" y1=\"10\" x2=\"32\" y2=\"17\"/>\n          <line x1=\"26\" y1=\"10\" x2=\"38\" y2=\"10\"/>\n          <line x1=\"50\" y1=\"20\" x2=\"54\" y2=\"16\"/>\n        <\/svg>\n        <div class=\"label\">Cook Time:<br><b>27 Min<\/b><\/div>\n      <\/div>\n    <\/div>\n\n    <div class=\"rule thin\"><\/div>\n\n    <div class=\"content\">\n      <div class=\"col-ingredients\">\n        <h2>Ingredients<\/h2>\n\n        <ul>\n                  <li>1½ cups white whole wheat flour<\/li>\n                  <li>1 tsp baking soda<\/li>\n                  <li>½ tsp salt<\/li>\n                  <li>3 tsp cinnamon<\/li>\n                  <li>½ tsp nutmeg<\/li>\n                  <li>1 cup applesauce<\/li>\n                  <li>1 egg<\/li>\n                  <li>¼ cup honey or maple syrup<\/li>\n                  <li>4 tbsp melted butter<\/li>\n                  <li>1 tsp vanilla extract<\/li>\n                  <li>1 cup grated carrots<\/li>\n                  <li>⅓ cup golden raisins<\/li>\n                <\/ul>\n      <\/div>\n\n      <div class=\"col-directions\">\n        <h2>Directions<\/h2>\n        <ol>\n          <li>Preheat oven to 350°F and spray a muffin pan with cooking spray.<\/li>\n          <li>In a small bowl, mix the carrots and raisins; set aside.<\/li>\n          <li>In a medium bowl, whisk together the flour, baking soda, salt, cinnamon, and nutmeg — mix the baking soda in evenly to avoid green carrots.<\/li>\n          <li>In a large bowl, whisk together the applesauce, egg, honey, melted butter, and vanilla.<\/li>\n          <li>Stir half the flour mixture into the wet mixture, fold in the carrots and raisins, then stir in the remaining flour mixture.<\/li>\n          <li>Scoop about ¼ cup batter into each muffin cup.<\/li>\n          <li>Bake at 350°F for 22 to 27 minutes, until a toothpick comes out clean.<\/li>\n          <li>Cool in the pan 2 minutes, then cool completely on a wire rack.<\/li>\n        <\/ol>\n      <\/div>\n    <\/div>\n    <div class=\"source\">Adapted from Brooklyn Active Mama&#x27;s Carrot Muffins<\/div>\n  <\/div>\n<\/body>\n<\/html>\n"},

 15 V31 M57 15 C53 19 53 28 57 31\"/>\n          <line x1=\"57\" y1=\"31\" x2=\"57\" y2=\"49\"/>\n        <\/svg>\n        <div class=\"label\"><b>13–14 Cups<\/b><\/div>\n      <\/div>\n      <div class=\"divider\"><\/div>\n      <div class=\"stat\">\n        <svg width=\"30\" height=\"30\" viewBox=\"0 0 64 64\" fill=\"none\" stroke=\"#2b2b2b\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\n          <circle cx=\"32\" cy=\"36\" r=\"19\"/>\n          <line x1=\"32\" y1=\"36\" x2=\"32\" y2=\"25\"/>\n          <line x1=\"32\" y1=\"36\" x2=\"40\" y2=\"36\"/>\n          <line x1=\"32\" y1=\"10\" x2=\"32\" y2=\"17\"/>\n          <line x1=\"26\" y1=\"10\" x2=\"38\" y2=\"10\"/>\n          <line x1=\"50\" y1=\"20\" x2=\"54\" y2=\"16\"/>\n        <\/svg>\n        <div class=\"label\">Prep Time:<br><b>10 Min<\/b><\/div>\n      <\/div>\n      <div class=\"divider\"><\/div>\n      <div class=\"stat\">\n        <svg width=\"30\" height=\"30\" viewBox=\"0 0 64 64\" fill=\"none\" stroke=\"#2b2b2b\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\n          <circle cx=\"32\" cy=\"36\" r=\"19\"/>\n          <line x1=\"32\" y1=\"36\" x2=\"32\" y2=\"25\"/>\n          <line x1=\"32\" y1=\"36\" x2=\"40\" y2=\"36\"/>\n          <line x1=\"32\" y1=\"10\" x2=\"32\" y2=\"17\"/>\n          <line x1=\"26\" y1=\"10\" x2=\"38\" y2=\"10\"/>\n          <line x1=\"50\" y1=\"20\" x2=\"54\" y2=\"16\"/>\n        <\/svg>\n        <div class=\"label\">Cook Time:<br><b>6 Min<\/b><\/div>\n      <\/div>\n    <\/div>\n\n    <div class=\"rule thin\"><\/div>\n\n    <div class=\"content\">\n      <div class=\"col-ingredients\">\n        <h2>Ingredients<\/h2>\n\n        <div class=\"subhead\">Mix:<\/div>\n        <ul>\n                  <li>3 cups Corn Chex cereal<\/li>\n                  <li>3 cups Rice Chex cereal<\/li>\n                  <li>3 cups Wheat Chex cereal<\/li>\n                  <li>2 cups Cheez-Its crackers<\/li>\n                  <li>2 cups snaps pretzels<\/li>\n                <\/ul>\n        <div class=\"subhead\">Seasoning:<\/div>\n        <ul>\n                  <li>8 tbsp (1 stick) unsalted butter<\/li>\n                  <li>2 tbsp Worcestershire sauce<\/li>\n                  <li>2 tsp Lawry&#x27;s seasoned salt<\/li>\n                  <li>1 tsp garlic powder<\/li>\n                  <li>½ tsp onion powder<\/li>\n                <\/ul>\n      <\/div>\n\n      <div class=\"col-directions\">\n        <h2>Directions<\/h2>\n        <ol>\n          <li>In a large microwave-safe bowl, combine the Chex cereal, Cheez-Its, and pretzels.<\/li>\n          <li>In a small bowl, microwave the butter until melted, then stir in the Worcestershire sauce, seasoned salt, garlic powder, and onion powder.<\/li>\n          <li>Pour the butter mixture over the cereal in three batches, stirring well after each.<\/li>\n          <li>Microwave on high 6 minutes, stirring every 2 minutes.<\/li>\n          <li>Spread on paper towels to cool. Store in airtight containers at room temperature up to 5 days.<\/li>\n        <\/ol>\n      <\/div>\n    <\/div>\n    <div class=\"source\">Adapted from Culinary Hill&#x27;s Chex Mix<\/div>\n  <\/div>\n<\/body>\n<\/html>\n"},
